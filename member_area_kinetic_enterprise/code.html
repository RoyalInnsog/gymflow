<style>
    .material-symbols-outlined {
        font-family: 'Material Symbols Outlined';
        font-weight: normal;
        font-style: normal;
        font-size: 24px;
        line-height: 1;
        letter-spacing: normal;
        text-transform: none;
        display: inline-block;
        white-space: nowrap;
        word-wrap: normal;
        direction: ltr;
        -webkit-font-feature-settings: 'liga';
        -webkit-font-smoothing: antialiased;
    }

    /* View transitions — enter only, transform+opacity, reduced-motion safe. */
    .mbr-view { animation: mbr-view-in 0.22s cubic-bezier(0.2, 0.6, 0.3, 1); }
    @keyframes mbr-view-in {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0); }
    }
    .mbr-sheet-panel { animation: mbr-sheet-in 0.24s cubic-bezier(0.2, 0.7, 0.3, 1); }
    @keyframes mbr-sheet-in {
        from { transform: translateY(24px); opacity: 0; }
        to   { transform: translateY(0); opacity: 1; }
    }
    @media (prefers-reduced-motion: reduce) {
        .mbr-view, .mbr-sheet-panel { animation: none; }
    }

    /* Member glass card — same material as the admin app, member-sized. */
    .mbr-card {
        background: color-mix(in srgb, var(--surface-container) 72%, transparent);
        -webkit-backdrop-filter: blur(14px);
        backdrop-filter: blur(14px);
        border: 1px solid color-mix(in srgb, var(--outline-variant) 36%, transparent);
        border-radius: 0.75rem;
    }

    /* Bottom navigation sticky container */
    .jsb-bottom-nav {
        position: fixed !important;
        bottom: 0 !important;
        left: 0 !important;
        right: 0 !important;
        z-index: 50 !important;
        padding-bottom: env(safe-area-inset-bottom, 0px) !important;
    }

    /* ── [U2 layout fix] App-shell scrolling ──────────────────────────────
       The fixed header + bottom nav must live OUTSIDE the scroll region, or on
       mobile (document scroll + overflow-x:hidden on html/body) position:fixed
       gets measured against the tall document and both the nav AND the bottom
       sheet sink to the bottom of the page. Solution: the document itself does
       NOT scroll — only <main> does. This makes the fixed chrome bulletproof
       and lets the library filter bar use position:sticky. */
    html, body { height: 100%; }
    body { overflow: hidden; overscroll-behavior: none; }
    #mbr-main {
        position: fixed;
        top: 56px;                                              /* header (h-14) */
        bottom: calc(64px + env(safe-area-inset-bottom, 0px));  /* bottom nav   */
        left: 0; right: 0;
        overflow-y: auto;
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior: contain;
    }
    /* Scroll-lock the page behind an open bottom sheet / dialog. */
    body.mbr-lock #mbr-main { overflow: hidden; }

    /* Bottom navigation active state */
    .mbr-tab { position: relative; min-width: 60px; min-height: 56px; }
    .mbr-tab .mbr-tab-ind {
        position: absolute; top: 4px; left: 50%; transform: translateX(-50%) scaleX(0);
        width: 28px; height: 3px; border-radius: 9999px;
        background: var(--color-primary);
        transition: transform 0.18s ease-out;
    }
    .mbr-tab.active .mbr-tab-ind { transform: translateX(-50%) scaleX(1); }

    /* Attendance calendar + heatmap */
    .cal-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 4px; }
    .cal-cell {
        aspect-ratio: 1; display: flex; flex-direction: column; align-items: center;
        justify-content: center; border-radius: 0.5rem; font-size: 12px; gap: 2px;
    }
    .heat-grid { display: grid; grid-auto-flow: column; grid-template-rows: repeat(7, 12px); gap: 3px; }
    .heat-cell { width: 12px; height: 12px; border-radius: 3px; }

    /* Circular progress ring (days-left + rest timer) */
    .ring-track { stroke: color-mix(in srgb, var(--outline-variant) 45%, transparent); }
    .ring-val { stroke: var(--color-primary); transition: stroke-dashoffset 0.4s ease; }

    /* Segmented control (settings theme / workout subtabs) */
    .seg { display: flex; background: var(--surface-container-low); border: 1px solid color-mix(in srgb, var(--outline-variant) 40%, transparent); border-radius: 0.5rem; padding: 3px; gap: 3px; }
    .seg button { flex: 1; padding: 8px 4px; border-radius: 0.4rem; font-size: 12px; font-weight: 600; color: var(--on-surface-variant); transition: all 0.15s; min-height: 38px; }
    .seg button.active { background: color-mix(in srgb, var(--color-primary) 14%, transparent); color: var(--color-primary); }

    /* Toggle switch */
    .tgl { position: relative; width: 44px; height: 26px; border-radius: 9999px; background: var(--surface-container-highest); border: 1px solid color-mix(in srgb, var(--outline-variant) 50%, transparent); transition: background 0.18s; flex-shrink: 0; }
    .tgl::after { content: ''; position: absolute; top: 2px; left: 2px; width: 20px; height: 20px; border-radius: 9999px; background: var(--on-surface-variant); transition: transform 0.18s, background 0.18s; }
    .tgl.on { background: color-mix(in srgb, var(--color-primary) 35%, transparent); }
    .tgl.on::after { transform: translateX(18px); background: var(--color-primary); }

    /* Attendance transition animations */
    .cal-transition-container {
        position: relative;
        overflow: hidden;
    }
    .cal-transition-content {
        transition: transform 0.24s cubic-bezier(0.2, 0.8, 0.3, 1), opacity 0.24s linear;
    }
    .cal-slide-left-exit { transform: translateX(-16px); opacity: 0; }
    .cal-slide-left-enter { transform: translateX(16px); opacity: 0; }
    .cal-slide-right-exit { transform: translateX(16px); opacity: 0; }
    .cal-slide-right-enter { transform: translateX(-16px); opacity: 0; }

    /* Modal dialog pop-up */
    .mbr-modal-panel {
        animation: mbr-modal-in 0.22s cubic-bezier(0.2, 0.8, 0.3, 1);
    }
    @keyframes mbr-modal-in {
        from { transform: scale(0.94); opacity: 0; }
        to   { transform: scale(1); opacity: 1; }
    }
</style>

<script>
(function () {
  'use strict';

  // ── [U1] Extension registry — future phases (Health Connect, wearables, GPS
  // attendance, AI coach) REGISTER here; nothing else in this file changes.
  window.GymMemberExt = {
    healthSources: [],
    attendanceProviders: [],
    ai: { status: 'unavailable' },
    registerHealthSource: function (src) { this.healthSources.push(src); },
    registerAttendanceProvider: function (p) { this.attendanceProviders.push(p); }
  };

  // ── Wearables & Health Connect gateway ──────────────────────────────────
  // REAL device integration only. There are NO mock datasets, NO simulated
  // "linked" states and NO synthetic vitals anywhere in here. A tracking vector
  // is reported CONNECTED / LINKED strictly after a genuine platform handshake:
  //   • Smartwatch      → Web Bluetooth GATT (navigator.bluetooth) or a native
  //                       Capacitor BLE pairing intent. Heart-rate telemetry, when
  //                       present, streams from the device's real Heart Rate
  //                       Measurement characteristic — never Math.random().
  //   • Health Connect  → the native Capacitor HealthConnect plugin's permission
  //                       grant. When the platform API is unavailable we REFUSE to
  //                       link rather than fake it.
  var Wearables = {
    watch: { connected: false, device: null, gatt: null, hrChar: null, lastHeartRate: null },
    listeners: [],

    on: function (fn) { if (typeof fn === 'function') this.listeners.push(fn); },
    state: function () { return { watchConnected: this.isWatchConnected(), healthLinked: this.isHealthLinked() }; },
    _emit: function () {
      var st = this.state();
      this.listeners.forEach(function (f) { try { f(st); } catch (e) {} });
      // Re-render the live surfaces (Progress status indicator + gated charts,
      // Settings connection rows) so they reflect the real connection state
      // without a manual reload.
      if (S.view === 'progress' || S.view === 'settings') route();
    },

    // ---- Google Health Connect (Android platform permissions) ------------
    _hcPlugin: function () {
      return (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.HealthConnect) || null;
    },
    isHealthLinked: function () { return localStorage.getItem('health_connect_linked') === 'true'; },
    _setHealthLinked: function (v) {
      if (v) localStorage.setItem('health_connect_linked', 'true');
      else localStorage.removeItem('health_connect_linked');
      // Server-authoritative: members.health_connect_linked is the source of truth
      // that /overview mirrors back. Persist it and drop the cached overview so the
      // next fetch reflects this value instead of clobbering it.
      if (S.overview && S.overview.member) S.overview.member.health_connect_linked = v ? 1 : 0;
      try {
        if (window.GymLocalDB && window.GymLocalDB.deleteResponsesByPrefix) window.GymLocalDB.deleteResponsesByPrefix('/member/overview');
        if (window.api && window.api.post) window.api.post('/member/health-connect', { linked: !!v }).catch(function () {});
      } catch (e) {}
    },

    // Explicitly request READ authorization for the metrics we consume and only
    // flip the linked flag on a real grant. No web "simulation" fallback exists.
    linkHealthConnect: function () {
      var self = this;
      var pl = this._hcPlugin();
      if (!pl || typeof pl.requestPermissions !== 'function') {
        return Promise.reject(new Error('Health Connect needs the Gym Flow Android app with Google Health Connect installed.'));
      }
      var readScopes = ['steps', 'sleep', 'heart_rate', 'calories', 'weight'];
      return Promise.resolve(pl.requestPermissions({ read: readScopes })).then(function (res) {
        var granted = (res && res.grantedPermissions) || [];
        var required = ['steps', 'heart_rate', 'calories'];
        var ok = (res && res.granted === true) || required.every(function (s) { return granted.indexOf(s) !== -1; });
        if (!ok) throw new Error('Health Connect read access was not granted.');
        self._setHealthLinked(true);
        self._emit();
        self.syncData().catch(function () {}); // pull the first real window in the background
        return true;
      });
    },
    unlinkHealthConnect: function () { this._setHealthLinked(false); this._emit(); },

    // Fetch real biometrics from the platform and persist the fields our health
    // log supports. No-op (resolves empty) when unlinked or the plugin is absent —
    // it never fabricates data.
    syncData: function () {
      var self = this;
      var pl = this._hcPlugin();
      if (!this.isHealthLinked() || !pl || typeof pl.fetchData !== 'function') return Promise.resolve({ synced: 0 });
      return Promise.resolve(pl.fetchData({
        startDate: new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString(),
        endDate: new Date().toISOString(),
        metrics: ['steps', 'sleep', 'heart_rate', 'calories', 'weight']
      })).then(function (res) { return self._persist((res && res.biometrics) || []); });
    },

    // Collapse the platform's per-sample readings into one payload per day and
    // upsert them through the same offline-first health repo the manual logs use.
    // steps / sleep_minutes / heart_rate are now first-class health-log columns,
    // so the real Health Connect data lands in the Progress charts.
    _persist: function (biometrics) {
      if (!biometrics || !biometrics.length || !repos()) return Promise.resolve({ synced: 0 });
      var byDay = {};
      biometrics.forEach(function (b) {
        if (!b) return;
        var d = String(new Date(b.timestamp || Date.now()).toISOString()).slice(0, 10);
        var day = byDay[d] || (byDay[d] = { log_date: d });
        if (b.type === 'calories') day.calories = Math.round(num(b.value));
        else if (b.type === 'weight') day.weight_kg = num(b.value);
        else if (b.type === 'steps') day.steps = Math.round(num(b.value));
        else if (b.type === 'sleep') day.sleep_minutes = Math.round(num(b.value));
        else if (b.type === 'heart_rate') day.heart_rate = Math.round(num(b.value));
      });
      var days = Object.keys(byDay).filter(function (d) {
        var e = byDay[d];
        return e.calories != null || e.weight_kg != null || e.steps != null || e.sleep_minutes != null || e.heart_rate != null;
      });
      return Promise.all(days.map(function (d) { return repos().health.log(byDay[d]); }))
        .then(function () { if (S.view === 'progress') route(); return { synced: days.length }; });
    },

    // ---- Smartwatch (native BLE bridge / Web Bluetooth) ------------------
    isWatchConnected: function () { return !!this.watch.connected; },
    // The custom native Capacitor plugin (WearableBridgePlugin.java): real GATT
    // scan/connect + live Heart Rate Measurement (0x2A37) notifications.
    _blePlugin: function () {
      return (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.WearableBridge) || null;
    },
    _wireBleEvents: function () {
      if (this._bleWired) return;
      var ble = this._blePlugin();
      if (!ble || typeof ble.addListener !== 'function') { this._bleWired = true; return; }
      var self = this;
      ble.addListener('characteristicChanged', function (ev) { self._onHeartRate(ev && (ev.heartRate != null ? ev.heartRate : ev.value)); });
      ble.addListener('disconnected', function () { self._onWatchDisconnected(); });
      this._bleWired = true;
    },

    // Genuine pairing handshake. Resolves ONLY when a device actually connects;
    // never flips state on a cancelled picker, a failed handshake, or a disabled
    // adapter. Native BLE first (production app); Web Bluetooth is the dev/browser
    // fallback.
    linkSmartwatch: function () {
      var self = this;
      var ble = this._blePlugin();
      if (ble && typeof ble.startScan === 'function') {
        this._wireBleEvents();
        return new Promise(function (resolve, reject) {
          var devices = [], seen = {}, foundHandle = null, picker = null, settled = false;
          function finish(fn, arg) {
            if (settled) return; settled = true;
            try { if (foundHandle && foundHandle.remove) foundHandle.remove(); } catch (e) {}
            try { ble.stopScan(); } catch (e) {}
            if (picker) picker.close();
            fn(arg);
          }
          Promise.resolve(ble.addListener('deviceFound', function (d) {
            if (!d || !d.deviceId || seen[d.deviceId]) return;
            seen[d.deviceId] = true; devices.push(d);
            if (picker) picker.update(devices);
          })).then(function (h) { foundHandle = h; }).catch(function () {});
          picker = self._showDevicePicker(devices, function (deviceId) {
            Promise.resolve(ble.connect({ deviceId: deviceId })).then(function () {
              self.watch.connected = true; self.watch.deviceId = deviceId; self._emit();
              finish(resolve, true);
            }).catch(function (e) {
              self.watch.connected = false;
              finish(reject, new Error((e && e.message) || 'Could not connect to the device.'));
            });
          }, function () { finish(reject, new Error('Pairing cancelled.')); });
          Promise.resolve(ble.startScan({})).catch(function (e) {
            finish(reject, new Error((e && e.message) || 'Bluetooth scan failed — is Bluetooth on?'));
          });
        });
      }
      // Web Bluetooth (browser/dev) — opens the real system device-chooser.
      if (navigator.bluetooth && typeof navigator.bluetooth.requestDevice === 'function') {
        return navigator.bluetooth.requestDevice({
          filters: [{ services: ['heart_rate'] }], optionalServices: ['battery_service']
        }).then(function (device) {
          self.watch.device = device;
          device.addEventListener('gattserverdisconnected', function () { self._onWatchDisconnected(); });
          return device.gatt.connect();
        }).then(function (server) {
          self.watch.gatt = server; return server.getPrimaryService('heart_rate');
        }).then(function (svc) { return svc.getCharacteristic('heart_rate_measurement'); })
        .then(function (ch) {
          self.watch.hrChar = ch;
          ch.addEventListener('characteristicvaluechanged', function (ev) { self._onHeartRate(self._parseHeartRate(ev.target.value)); });
          return ch.startNotifications();
        }).then(function () { self.watch.connected = true; self._emit(); return true; })
        .catch(function (err) {
          self.watch.connected = false;
          var msg = (err && err.name === 'NotFoundError') ? 'No smartwatch selected.' : ((err && err.message) || 'Bluetooth pairing failed — is Bluetooth enabled?');
          throw new Error(msg);
        });
      }
      return Promise.reject(new Error('Bluetooth pairing needs a device with Bluetooth enabled (open the Gym Flow app or a Bluetooth-capable browser).'));
    },

    // Live scan/pair modal — populated in real time from BLE deviceFound events.
    _showDevicePicker: function (devices, onSelect, onCancel) {
      var old = document.getElementById('watch-scan-modal'); if (old) old.remove();
      var overlay = document.createElement('div');
      overlay.id = 'watch-scan-modal';
      overlay.className = 'fixed inset-0 bg-black/70 backdrop-blur-sm z-[9998] flex items-center justify-center p-4';
      overlay.innerHTML =
        '<div class="w-[90%] max-w-sm bg-surface-container-low border border-outline-variant/30 rounded-2xl p-5 shadow-2xl">' +
        '  <div class="flex items-center gap-2 mb-2">' +
        '    <span class="material-symbols-outlined text-primary text-[22px]">bluetooth_searching</span>' +
        '    <h3 class="font-headline text-headline-sm text-on-surface font-bold flex-1">Pair a smartwatch</h3>' +

  // Gather a derived snapshot from data the offline engine already syncs. Used

  function gatherContext() {

  // ── health quick-log helpers ─────────────────────────────
  function logHealth(fields, current) {
    var payload = { log_date: todayStr() };
    // send the full merged day so the latest row is self-contained
    ['weight_kg', 'water_ml', 'calories', 'protein_g'].forEach(function (k) {
      var v = fields[k] !== undefined ? fields[k] : (current ? current[k] : undefined);
      if (v !== undefined && v !== null && v !== '') payload[k] = Number(v);
    });
    return repos().health.log(payload).then(function (r) {
      if (r && r.error) { window.toast(r.error, 'error'); return; }
      window.toast(r && r.offline ? 'Saved — will sync automatically' : 'Saved', 'success');
      if (S.view === 'home' && S.homeEl) {
        Promise.all([
          getOverview(),
          repos().health.list(),
          repos().sessions.list(),
          repos().attendance.list(),
          repos().workouts.list()
        ]).then(function(res) {
          if (S.view !== 'home') return;
          renderHome(S.homeEl, res[0], res[1] || [], res[2] || [], res[3] || [], res[4] || []);
        });
      } else if (S.view === 'progress') {
        route();
      }
    });
  }

      var v = Number(document.getElementById('f-weight').value);

  function showAICreateWorkoutModal() {
    var body =
      '<div class="py-2">' +
      '  <p class="text-body-md text-on-surface-variant mb-4">Draft a custom workout program using the <b>Gemma4 e2b model</b>. Enter your fitness goal, schedule, or equipment below:</p>' +
      '  <label class="block mb-4">' +
      '    <span class="block font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest mb-1.5">Prompt / Request</span>' +
      '    <textarea id="ai-wk-prompt" rows="3" class="w-full bg-surface-container-lowest border border-outline-variant/40 rounded-lg px-3.5 py-3 text-body-lg text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none" placeholder="e.g., 3-day full body dumbbells only for a beginner focusing on shoulders and core"></textarea>' +
      '  </label>' +
      '  <div id="ai-wk-status" class="hidden flex flex-col items-center justify-center py-4 text-center">' +
      '    <div class="w-8 h-8 rounded-full border-2 border-primary/30 border-t-primary animate-spin mb-2"></div>' +
      '    <div class="text-body-sm text-on-surface-variant font-semibold">Generating your program...</div>' +
      '  </div>' +
      '</div>';
    var foot = primaryBtn('ai-wk-generate', 'GENERATE PROGRAM', 'auto_awesome');
    openModal('Create with AI', body, foot);
    document.getElementById('ai-wk-generate').addEventListener('click', function() {
      var p = document.getElementById('ai-wk-prompt').value.trim();
      if (!p) { window.toast('Please enter a prompt', 'warning'); return; }
      var statusEl = document.getElementById('ai-wk-status');
      var genBtn = document.getElementById('ai-wk-generate');
      var statusText = statusEl.querySelector('.text-body-sm') || statusEl;
      statusEl.classList.remove('hidden');
      genBtn.disabled = true;

      // Build a REAL, prompt-driven program from the on-device exercise library
      // (parses goal / equipment / difficulty / muscle keywords). This replaces
      // the old hardcoded 4-exercise boilerplate that ignored the prompt.
      function buildPlan() {
        var text = p.toLowerCase();
        var difficulty = /\b(begin|novice|new)/.test(text) ? 'Beginner'
          : /\b(advanc|expert|elite)/.test(text) ? 'Advanced' : 'Intermediate';
        var equipment = /dumbbell/.test(text) ? 'Dumbbell'
          : /barbell/.test(text) ? 'Barbell'
          : /(bodyweight|no equipment|home)/.test(text) ? 'Bodyweight'
          : /machine/.test(text) ? 'Machine'
          : /kettlebell/.test(text) ? 'Kettlebell' : null;
        var keywords = ['chest','back','legs','leg','glute','shoulder','arm','bicep','tricep','core','abs','ab','cardio','squat','push','pull','hiit','mobility'];
        var hits = keywords.filter(function (k) { return text.indexOf(k) !== -1; });

        var lib = window.GymExerciseLibrary;
        var picks = [], seen = {};
        function add(list) { (list || []).forEach(function (e) { if (e && !seen[e.id]) { seen[e.id] = 1; picks.push(e); } }); }
        if (lib && lib.search) {
          if (hits.length) hits.forEach(function (k) { add(lib.search({ q: k, difficulty: difficulty, equipment: equipment })); });
          if (!picks.length) add(lib.search({ difficulty: difficulty, equipment: equipment }));
          if (!picks.length) add(lib.search({}));
        }
        var sets = difficulty === 'Advanced' ? 4 : 3;
        var exercises = picks.slice(0, 6).map(function (e) {
          return {
            name: e.name,
            muscle: e.primary_muscle || (e.target_muscles && e.target_muscles[0]) || 'Full Body',
            sets: sets, reps: 12, weight_kg: 0, rest_sec: 60, library_id: e.id
          };
        });
        // Library not loaded → minimal prompt-derived set (still not fixed boilerplate).
        if (!exercises.length) {
          exercises = (hits.length ? hits.slice(0, 4) : ['full body']).map(function (m) {
            return { name: m.charAt(0).toUpperCase() + m.slice(1) + ' focus', muscle: m, sets: sets, reps: 12, weight_kg: 0, rest_sec: 60 };
          });
        }
        return {
          name: 'AI: ' + (p.length > 25 ? p.slice(0, 25) + '…' : p),
          day_of_week: 'Monday', is_active: 1, created_by: 'Gemma-e2b',
          notes: 'Generated on-device for: ' + p,
          exercises: exercises
        };
      }

      function persist(plan) {
        repos().workouts.create(plan).then(function (r) {
          genBtn.disabled = false;
          closeSheet();
          if (r && r.error) window.toast(r.error, 'error');
          else { window.toast('Workout program generated successfully! 🎉', 'success'); if (S.view === 'workout') route(); }
        }).catch(function () { genBtn.disabled = false; window.toast('Could not save the program.', 'error'); });
      }

      var plan = buildPlan();

      // Bind to the RUNNING on-device model when it's live (native Gemma via the
      // GymLlm plugin registers window.GymNativeLLM). Stream its tokens into the
      // status line, then persist the structured plan. In a plain browser with
      // no native model we compose from the on-device library engine directly —
      // never the old fixed setTimeout boilerplate.
      var llm = window.GymNativeLLM;
      if (llm && typeof llm.generate === 'function') {
        if (statusText) statusText.textContent = 'Generating with on-device Gemma…';
        var llmPrompt = 'Create a concise gym workout program for this request: "' + p + '". List exercises with sets and reps.';
        llm.generate(llmPrompt, { onToken: function (tok, full) { if (statusText) statusText.textContent = String(full || '').slice(-120); } })
          .then(function (out) { if (out && out.trim()) plan.notes = out.trim().slice(0, 2000); persist(plan); })
          .catch(function () { persist(plan); });
      } else {
        if (statusText) statusText.textContent = 'Composing your program on-device…';
        setTimeout(function () { persist(plan); }, 250);
      }
    });
  }

        '  <button id="btn-routine1" class="flex-1 py-2.5 px-3 rounded-xl border text-left transition-all ' + (S.nowSelectedRoutine === 'routine1' ? 'border-primary bg-primary/10 text-primary font-bold' : 'border-outline-variant/30 text-on-surface-variant') + '">' +
        '    <div class="text-body-xs font-label-caps tracking-widest uppercase">Routine 1</div>' +
        '    <div class="text-title-sm font-bold">Day-Wise Split</div>' +
        '  </button>' +
        '  <button id="btn-routine2" class="flex-1 py-2.5 px-3 rounded-xl border text-left transition-all ' + (S.nowSelectedRoutine === 'routine2' ? 'border-primary bg-primary/10 text-primary font-bold' : 'border-outline-variant/30 text-on-surface-variant') + '">' +
        '    <div class="text-body-xs font-label-caps tracking-widest uppercase">Routine 2</div>' +
        '    <div class="text-title-sm font-bold">PPL Split</div>' +
        '  </button>' +
        '</div>';

      var activeRoutine = MUSCLE_ROUTINES[S.nowSelectedRoutine];
      var diff = S.nowDifficulty;

      html += '<div class="space-y-4">';
      activeRoutine.days.forEach(function(day, dayIdx) {
        var exercises = day[diff] || [];
        var exListHtml = exercises.map(function(ex) {
          return '<div class="flex items-center justify-between py-2 border-b border-outline-variant/10 last:border-0">' +
            '  <div class="min-w-0 flex-1">' +
            '    <div class="text-body-md text-on-surface font-semibold truncate">' + esc(ex.name) + '</div>' +
            '  </div>' +
            '  <div class="text-right ml-2 shrink-0 font-mono text-body-sm text-on-surface-variant">' +
            ex.sets + '×' + (typeof ex.reps === 'number' ? ex.reps : esc(ex.reps)) + ' (Rest: ' + ex.rest + 's)' +
            '  </div>' +
            '</div>';
        }).join('');

        html +=
          '<div class="mbr-card p-4">' +
          '  <div class="flex items-center justify-between mb-2 pb-1.5 border-b border-outline-variant/20">' +
          '    <div class="text-title-sm text-on-surface font-bold">' + esc(day.name) + '</div>' +
          '    <span class="px-2 py-0.5 rounded bg-primary/10 border border-primary/20 text-[9px] text-primary uppercase font-bold tracking-widest">Day ' + (dayIdx + 1) + '</span>' +
          '  </div>' +
          '  <div class="divide-y divide-outline-variant/10">' + exListHtml + '</div>' +
          '  <button data-start-routine-day="' + S.nowSelectedRoutine + '|' + dayIdx + '" class="mt-3.5 w-full bg-primary text-on-primary py-2 rounded-lg text-body-sm font-bold flex items-center justify-center gap-1.5 hover:opacity-90 active:scale-[0.98] transition-all min-h-[38px]"><span class="material-symbols-outlined text-[18px]">play_arrow</span>Start Workout</button>' +
          '</div>';
      });
      html += '</div>';
    } else {
      // Cardio & Abs Section
      var list = CARDIO_ROUTINES[S.nowDifficulty] || [];
      var cardioHtml = list.map(function(item) {
        var metricsStr = item.sets ? item.sets + ' sets × ' + item.reps + ' (Rest: ' + item.rest + ')' : item.intensity;
        return '<div class="py-3 border-b border-outline-variant/10 last:border-0">' +
          '  <div class="flex items-start justify-between gap-3">' +
          '    <div class="min-w-0 flex-1">' +
          '      <div class="text-body-md text-on-surface font-bold">' + esc(item.name) + '</div>' +
          '      <div class="text-body-sm text-on-surface-variant mt-0.5">' + esc(metricsStr) + '</div>' +
          '    </div>' +
          '    <span class="px-2 py-0.5 rounded bg-secondary/15 text-secondary text-[10px] uppercase font-bold tracking-wider shrink-0">' + esc(item.duration) + '</span>' +
          '  </div>' +
          '</div>';
      }).join('');

      html +=
        '<div class="mbr-card p-4">' +
        '  <div class="flex items-center justify-between mb-3 pb-2 border-b border-outline-variant/20">' +
        '    <div class="text-title-sm text-on-surface font-bold">Cardio &amp; Core Training</div>' +
        '    <span class="px-2 py-0.5 rounded bg-secondary/15 text-secondary text-[9px] uppercase font-bold tracking-widest">' + S.nowDifficulty + '</span>' +
        '  </div>' +
        '  <div class="divide-y divide-outline-variant/10">' + cardioHtml + '</div>' +
        '  <button id="start-now-cardio" class="mt-4 w-full bg-primary text-on-primary py-2.5 rounded-lg text-body-sm font-bold flex items-center justify-center gap-1.5 hover:opacity-90 active:scale-[0.98] transition-all min-h-[40px]"><span class="material-symbols-outlined text-[18px]">play_arrow</span>Start Cardio Session</button>' +
        '</div>';
    }

    body.innerHTML = html;

    // Attach listeners
    document.getElementById('now-tab-muscle').addEventListener('click', function() { S.nowTab = 'muscle'; renderNowTab(body); });
    document.getElementById('now-tab-cardio').addEventListener('click', function() { S.nowTab = 'cardio'; renderNowTab(body); });
    
    body.querySelectorAll('[data-diff]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        S.nowDifficulty = btn.getAttribute('data-diff');
        renderNowTab(body);
      });
    });

    if (S.nowTab === 'muscle') {
      document.getElementById('btn-routine1').addEventListener('click', function() { S.nowSelectedRoutine = 'routine1'; renderNowTab(body); });
      document.getElementById('btn-routine2').addEventListener('click', function() { S.nowSelectedRoutine = 'routine2'; renderNowTab(body); });
      
      body.querySelectorAll('[data-start-routine-day]').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var val = btn.getAttribute('data-start-routine-day').split('|');
          var rKey = val[0];
          var dayIdx = parseInt(val[1]);
          var routine = MUSCLE_ROUTINES[rKey];
          var day = routine.days[dayIdx];
          var exData = day[S.nowDifficulty];
          
          var plan = {
            id: 'temp-' + Date.now(),
            name: routine.name + ' - ' + day.name.split(' (')[0],
            exercises: exData.map(function(ex) {
              return {
                name: ex.name,
                sets: typeof ex.sets === 'number' ? ex.sets : 3,
                reps: typeof ex.reps === 'number' ? ex.reps : 10,
                weight_kg: 0,
                rest_sec: typeof ex.rest === 'number' ? ex.rest : 60,
                set_type: 'normal'
              };
            })
          };
          S.activeWorkout = {
            plan_id: plan.id,
            plan_name: plan.name,
            started_at: new Date().toISOString(),
            completed: [],
            exercises: plan.exercises,
            notes: ''
          };
          route();
        });
      });
    } else {
      var sc = document.getElementById('start-now-cardio');
      if (sc) {
        sc.addEventListener('click', function() {
          var plan = {
            id: 'temp-cardio-' + Date.now(),
            name: 'Cardio & Abs (' + S.nowDifficulty + ')',
            exercises: (CARDIO_ROUTINES[S.nowDifficulty] || []).map(function(item) {
              return {
                name: item.name,
                sets: item.sets ? Number(item.sets) : 1,
                reps: item.reps ? parseInt(item.reps) || 0 : 0,
                weight_kg: 0,
                rest_sec: item.rest ? parseInt(item.rest) || 60 : 60,
                set_type: 'normal'
              };
            })
          };
          S.activeWorkout = {
            plan_id: plan.id,
            plan_name: plan.name,
            started_at: new Date().toISOString(),
            completed: [],
            exercises: plan.exercises,
            notes: ''
          };
          route();
        });
      }
    }
  }

  function viewWorkout(el) {
    if (S.activeWorkout) { renderActiveWorkout(el); return; }
    el.innerHTML =
      '<div class="pt-3 pb-3 flex items-center justify-between gap-2">' +
      '  <div class="text-headline-sm text-headline-sm text-on-surface">Workout</div>' +
      '  <button id="wk-ai-create" class="bg-gradient-to-r from-primary to-secondary text-on-primary px-3.5 py-2 rounded-lg text-label-md font-extrabold flex items-center gap-1.5 min-h-[40px] shadow-[0_0_12px_rgba(var(--color-primary-rgb),0.4)] border border-primary/20 hover:opacity-90 active:scale-[0.98] transition-all">' +
      '    <span class="material-symbols-outlined text-[18px]">auto_awesome</span>' +
      '    <span>Create with AI</span>' +
      '  </button>' +
      '</div>' +
      '<div class="seg mb-4" id="wk-tabs">' +
      '  <button data-t="now">Now</button><button data-t="library">Library</button><button data-t="history">History</button><button data-t="records">Records</button>' +
      '</div>' +
      '<div id="wk-body">' + skel(3) + '</div>';
    
    el.querySelector('#wk-ai-create').addEventListener('click', showAICreateWorkoutModal);
    
    el.querySelectorAll('#wk-tabs button').forEach(function (b) {
      b.classList.toggle('active', b.getAttribute('data-t') === S.workoutTab);
      b.addEventListener('click', function () {
        S.workoutTab = b.getAttribute('data-t');
        el.querySelectorAll('#wk-tabs button').forEach(function (x) { x.classList.toggle('active', x === b); });
        renderWorkoutTab();
      });
    });
    renderWorkoutTab();
  }

  function renderWorkoutTab() {
    var body = document.getElementById('wk-body');
    if (!body) return;
    if (S.workoutTab === 'now') {
      renderNowTab(body);
    } else if (S.workoutTab === 'library') {
      renderLibraryTab(body);
    } else if (S.workoutTab === 'history') {
      repos().sessions.list().then(function (rows) {
        if (!document.getElementById('wk-body')) return;
        if (!rows.length) { body.innerHTML = emptyState('history', 'No workouts yet', 'Finish a workout and it lands here — even offline.'); return; }
        body.innerHTML = '<div class="mbr-card divide-y divide-outline-variant/15">' + rows.slice(0, 40).map(function (s) {
          var comp = Array.isArray(s.completed) ? s.completed.length : 0;
          return '<div class="px-4 py-3.5 flex items-center gap-3">' +
            '<div class="w-10 h-10 rounded-lg bg-primary/10 border border-primary/25 flex items-center justify-center"><span class="material-symbols-outlined text-[20px] text-primary">exercise</span></div>' +
            '<div class="flex-1 min-w-0"><div class="text-body-md font-semibold text-on-surface truncate">' + esc(s.plan_name || 'Workout') + '</div>' +
            '<div class="text-body-sm text-on-surface-variant">' + fmtDate(s.session_date) + (s.duration_min ? ' · ' + s.duration_min + ' min' : '') + (comp ? ' · ' + comp + ' done' : '') + '</div>' +
            (s.notes ? '<div class="text-body-sm text-on-surface-variant/80 italic mt-0.5 line-clamp-2">“' + esc(s.notes) + '”</div>' : '') + '</div>' +
            (num(s.total_volume_kg) ? '<div class="text-right shrink-0"><div class="text-title-md text-on-surface font-bold">' + Math.round(num(s.total_volume_kg)) + '</div><div class="text-[10px] text-on-surface-variant uppercase">kg vol</div></div>' : '') +
            '</div>';
        }).join('') + '</div>';
      });
    } else {
      repos().prs.list().then(function (rows) {
        if (!document.getElementById('wk-body')) return;
        var addBtn = '<button id="pr-add" class="w-full mb-3 bg-surface-container-low border border-dashed border-outline-variant/60 text-on-surface-variant py-3 rounded-xl text-label-md font-semibold flex items-center justify-center gap-1.5 hover:border-primary hover:text-primary transition-colors min-h-[46px]"><span class="material-symbols-outlined text-[18px]">add</span>Add personal record</button>';
        if (!rows.length) {
          body.innerHTML = addBtn + emptyState('trophy', 'No records yet', 'Log your first PR and watch it climb.');
        } else {
          body.innerHTML = addBtn + '<div class="mbr-card divide-y divide-outline-variant/15">' + rows.map(function (r) {
            return '<div class="px-4 py-3.5 flex items-center gap-3">' +
              '<div class="w-10 h-10 rounded-lg bg-tertiary/10 border border-tertiary/30 flex items-center justify-center"><span class="material-symbols-outlined text-[20px] text-tertiary" style="font-variation-settings: \'FILL\' 1;">trophy</span></div>' +
              '<div class="flex-1 min-w-0"><div class="text-body-md font-semibold text-on-surface truncate">' + esc(r.exercise) + '</div>' +
              '<div class="text-body-sm text-on-surface-variant">' + fmtDate(r.achieved_on) + '</div></div>' +
              '<div class="text-right mr-1"><div class="text-title-lg text-on-surface font-bold">' + num(r.weight_kg) + '<span class="text-body-sm font-normal">kg</span></div>' +
              '<div class="text-[10px] text-on-surface-variant uppercase">× ' + (r.reps || 1) + '</div></div>' +
              '<button data-prdel="' + esc(String(r.id)) + '" aria-label="Delete record" class="w-9 h-9 flex items-center justify-center rounded-full text-on-surface-variant hover:text-error hover:bg-error/10"><span class="material-symbols-outlined text-[18px] pointer-events-none">delete</span></button>' +
              '</div>';
          }).join('') + '</div>';
        }
        var pa = document.getElementById('pr-add');
        if (pa) pa.addEventListener('click', sheetAddPr);
        body.querySelectorAll('[data-prdel]').forEach(function (b) {
          b.addEventListener('click', function () {
            window.confirmDialog('Delete this record?', { danger: true }).then(function (ok) {
              if (!ok) return;
              repos().prs.remove(b.getAttribute('data-prdel')).then(function () { window.toast('Record deleted', 'success'); renderWorkoutTab(); });
            });
          });
        });
      });
    }
  }

  // Favorite plans — device-local (same pattern as exercise favorites).
  function favPlans() { try { return JSON.parse(localStorage.getItem('gf.member.favPlans')) || []; } catch (e) { return []; } }
  function isFavPlan(id) { return favPlans().indexOf(String(id)) !== -1; }
  function toggleFavPlan(id) { id = String(id); var l = favPlans(), i = l.indexOf(id); if (i === -1) l.push(id); else l.splice(i, 1); try { localStorage.setItem('gf.member.favPlans', JSON.stringify(l)); } catch (e) {} return i === -1; }

  function planCard(p) {
    var ex = Array.isArray(p.exercises) ? p.exercises : [];
    var fav = isFavPlan(p.id);
    var assigned = p.created_by && p.created_by !== 'member';
    var day = p.day_of_week ? '<span class="px-2 py-0.5 rounded bg-primary/10 border border-primary/25 text-primary text-[10px] font-bold uppercase tracking-wider">' + esc(p.day_of_week) + '</span>' : '';
    var preview = ex.slice(0, 4).map(function (e) {
      return '<div class="flex items-center justify-between py-2 border-b border-outline-variant/10 last:border-0">' +
        '<span class="text-body-md text-on-surface truncate mr-2">' + esc(e.name) + '</span>' +
        '<span class="text-body-sm text-on-surface-variant font-mono whitespace-nowrap">' + num(e.sets) + '×' + num(e.reps) + (num(e.weight_kg) ? ' · ' + num(e.weight_kg) + 'kg' : '') + '</span></div>';
    }).join('');
    return '<div class="mbr-card p-4 mb-3">' +
      '<div class="flex items-start justify-between gap-2 mb-1">' +
      '  <div class="min-w-0">' +
      '    <div class="flex items-center gap-1.5">' + (assigned ? '<span class="px-1.5 py-0.5 rounded bg-secondary/15 text-secondary text-[9px] font-bold uppercase tracking-wider shrink-0">Assigned</span>' : '') + '<div class="text-title-md text-on-surface font-bold truncate">' + esc(p.name) + '</div></div>' +
      '    <div class="text-body-sm text-on-surface-variant">' + ex.length + ' exercise' + (ex.length === 1 ? '' : 's') + '</div></div>' +
      '  <div class="flex items-center gap-1.5 shrink-0">' + day +
      '    <button data-fav-plan="' + esc(String(p.id)) + '" aria-label="Favorite plan" class="w-8 h-8 flex items-center justify-center rounded-full ' + (fav ? 'text-tertiary' : 'text-on-surface-variant') + ' hover:bg-surface-container"><span class="material-symbols-outlined text-[19px] pointer-events-none" style="font-variation-settings: \'FILL\' ' + (fav ? '1' : '0') + ';">star</span></button>' +
      '  </div>' +
      '</div>' +
      (preview ? '<div class="mt-2">' + preview + (ex.length > 4 ? '<div class="text-body-sm text-on-surface-variant pt-2">+ ' + (ex.length - 4) + ' more</div>' : '') + '</div>' : '') +
      (p.trainer_notes ? '<div class="mt-3 flex gap-2 bg-secondary/10 border border-secondary/25 rounded-lg px-3 py-2.5"><span class="material-symbols-outlined text-secondary text-[18px]">sports</span><div class="text-body-sm text-on-surface">' + esc(p.trainer_notes) + '</div></div>' : '') +
      '<div class="flex gap-2 mt-4">' +
      '  <button data-start="' + esc(String(p.id)) + '" class="flex-1 bg-primary text-on-primary py-2.5 rounded-lg text-label-md font-bold flex items-center justify-center gap-1.5 min-h-[44px]"><span class="material-symbols-outlined text-[18px]">play_arrow</span>Start</button>' +
      '  <button data-dup="' + esc(String(p.id)) + '" aria-label="Duplicate plan" class="w-11 h-11 flex items-center justify-center rounded-lg bg-surface-container-highest border border-outline-variant/40 text-on-surface-variant hover:text-primary"><span class="material-symbols-outlined text-[19px] pointer-events-none">content_copy</span></button>' +
      '  <button data-edit="' + esc(String(p.id)) + '" aria-label="Edit plan" class="w-11 h-11 flex items-center justify-center rounded-lg bg-surface-container-highest border border-outline-variant/40 text-on-surface-variant hover:text-primary"><span class="material-symbols-outlined text-[19px] pointer-events-none">edit</span></button>' +
      '  <button data-del="' + esc(String(p.id)) + '" aria-label="Delete plan" class="w-11 h-11 flex items-center justify-center rounded-lg bg-surface-container-highest border border-outline-variant/40 text-on-surface-variant hover:text-error"><span class="material-symbols-outlined text-[19px] pointer-events-none">delete</span></button>' +
      '</div></div>';
  }

  // ════════════════════════════════════════════════════════
  // EXERCISE LIBRARY  [U2] — professional built-in catalogue
  // ════════════════════════════════════════════════════════
  var LIBF = { q: '', category: 'All', equipment: 'All', difficulty: 'All', favoritesOnly: false };

  function diffMeta(d) {
    if (d === 'Beginner') return { cls: 'bg-secondary/15 text-secondary border border-secondary/30', short: 'BEG' };
    if (d === 'Advanced') return { cls: 'bg-tertiary/15 text-tertiary border border-tertiary/30', short: 'ADV' };
    return { cls: 'bg-primary/15 text-primary border border-primary/30', short: 'INT' };
  }
  // A library entry → a plan exercise row (sensible defaults; cardio/holds = 1 set).
  function libToPlanExercise(e) {
    var timed = (e.force === 'Cardio' || e.force === 'Static');
    return { name: e.name, muscle: e.primary_muscle, library_id: e.id,
      sets: timed ? 1 : 3, reps: timed ? 0 : 10, weight_kg: 0, rest_sec: e.default_rest_sec };
  }

  function libCard(e) {
    var lib = window.GymExerciseLibrary;
    var fav = lib.isFavorite(e.id);
    var dm = diffMeta(e.difficulty);
    return '<div data-ex-id="' + esc(e.id) + '" role="button" tabindex="0" class="mbr-card p-2.5 mb-2.5 flex items-center gap-3 cursor-pointer active:scale-[0.99] transition-transform">' +
      '<div class="w-11 h-11 rounded-xl bg-primary/10 border border-primary/25 flex items-center justify-center shrink-0"><span class="material-symbols-outlined text-[22px] text-primary">' + esc(e.category_icon) + '</span></div>' +
      '<div class="min-w-0 flex-1"><div class="text-body-md font-semibold text-on-surface truncate">' + esc(e.name) + '</div>' +
      '<div class="text-body-sm text-on-surface-variant truncate">' + esc(e.primary_muscle) + ' · ' + esc(e.equipment) + '</div></div>' +
      '<span class="px-1.5 py-0.5 rounded ' + dm.cls + ' text-[9px] uppercase font-bold tracking-wider shrink-0">' + dm.short + '</span>' +
      '<button data-fav-id="' + esc(e.id) + '" aria-label="Toggle favorite" class="w-8 h-8 flex items-center justify-center rounded-full shrink-0 ' + (fav ? 'text-tertiary' : 'text-on-surface-variant') + ' hover:bg-surface-container">' +
      '<span class="material-symbols-outlined text-[19px] pointer-events-none" style="font-variation-settings: \'FILL\' ' + (fav ? '1' : '0') + ';">star</span></button>' +
      '</div>';
  }

  function libSelect(id, label, options, active) {
    return '<label class="block"><span class="block text-[10px] text-on-surface-variant uppercase tracking-wider mb-1 pl-0.5">' + label + '</span>' +
      '<select id="' + id + '" class="w-full bg-surface-container-lowest border border-outline-variant/40 rounded-lg px-3 py-2.5 text-body-md text-on-surface min-h-[44px]">' +
      options.map(function (o) { return '<option value="' + esc(o) + '"' + (o === active ? ' selected' : '') + '>' + esc(o) + '</option>'; }).join('') +
      '</select></label>';
  }
  function libCatChips(lib) {
    var cats = ['All'].concat(lib.categories);
    return '<div class="flex gap-2 overflow-x-auto pb-1" id="lib-cats" style="scrollbar-width:none;-ms-overflow-style:none">' +
      cats.map(function (c) {
        var on = c === LIBF.category;
        return '<button data-cat="' + esc(c) + '" class="shrink-0 px-3 py-1.5 rounded-full text-[12px] font-semibold border transition-colors ' + (on ? 'bg-primary/15 border-primary/40 text-primary' : 'bg-surface-container-low border-outline-variant/30 text-on-surface-variant') + '">' + esc(c) + '</button>';
      }).join('') + '</div>';
  }

  function renderLibraryTab(body) {
    var lib = window.GymExerciseLibrary;
    if (!lib) { body.innerHTML = emptyState('exercise', 'Library unavailable', 'The exercise library could not load. Reconnect once so it caches for offline use.'); return; }
    body.innerHTML =
      '<div class="sticky top-0 z-30 -mx-4 px-4 pt-1 pb-2.5 mb-3 bg-background/90 backdrop-blur-xl border-b border-outline-variant/15">' +
      '  <div class="flex gap-2 mb-2.5">' +
      '    <div class="relative flex-1">' +
      '      <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-[18px] text-on-surface-variant pointer-events-none">search</span>' +
      '      <input id="lib-q" type="search" autocomplete="off" placeholder="Search ' + lib.count + ' exercises" value="' + esc(LIBF.q) + '" class="w-full bg-surface-container-lowest border border-outline-variant/40 rounded-lg pl-9 pr-3 py-2.5 text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none min-h-[44px]">' +
      '    </div>' +
      '    <button id="lib-fav" aria-label="Show favorites only" class="w-11 shrink-0 flex items-center justify-center rounded-lg border ' + (LIBF.favoritesOnly ? 'bg-tertiary/15 border-tertiary/40 text-tertiary' : 'bg-surface-container-low border-outline-variant/30 text-on-surface-variant') + '"><span class="material-symbols-outlined text-[20px] pointer-events-none" style="font-variation-settings: \'FILL\' ' + (LIBF.favoritesOnly ? '1' : '0') + ';">star</span></button>' +
      '  </div>' +
      libCatChips(lib) +
      '  <div class="grid grid-cols-2 gap-2 mt-2.5">' +
      libSelect('lib-eq', 'Equipment', ['All'].concat(lib.equipment), LIBF.equipment) +
      libSelect('lib-diff', 'Level', ['All'].concat(lib.difficulty), LIBF.difficulty) +
      '  </div>' +
      '</div>' +
      '<div id="lib-results"></div>';

    var q = document.getElementById('lib-q');
    var deb;
    q.addEventListener('input', function () { LIBF.q = q.value; clearTimeout(deb); deb = setTimeout(renderLibResults, 130); });
    document.getElementById('lib-fav').addEventListener('click', function () { LIBF.favoritesOnly = !LIBF.favoritesOnly; renderLibraryTab(document.getElementById('wk-body')); });
    document.getElementById('lib-eq').addEventListener('change', function (e) { LIBF.equipment = e.target.value; renderLibResults(); });
    document.getElementById('lib-diff').addEventListener('change', function (e) { LIBF.difficulty = e.target.value; renderLibResults(); });
    var catBox = document.getElementById('lib-cats');
    catBox.querySelectorAll('[data-cat]').forEach(function (b) {
      b.addEventListener('click', function () {
        LIBF.category = b.getAttribute('data-cat');
        catBox.querySelectorAll('[data-cat]').forEach(function (x) {
          var on = x === b;
          x.className = 'shrink-0 px-3 py-1.5 rounded-full text-[12px] font-semibold border transition-colors ' + (on ? 'bg-primary/15 border-primary/40 text-primary' : 'bg-surface-container-low border-outline-variant/30 text-on-surface-variant');
        });
        renderLibResults();
      });
    });

  // Recently-used strip (Section 1) — shown only on the unfiltered library view.
  function recentUsedHtml() {
    if (!window.GymMemberEngine) return '';
    var lib = window.GymExerciseLibrary;
    var items = window.GymMemberEngine.recentExercises()
      .map(function (id) { return lib.getById(id); }).filter(Boolean).slice(0, 8);
    if (!items.length) return '';
    return '<div class="mb-4">' +
      '<div class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest mb-2 pl-1">Recently used</div>' +
      '<div class="flex gap-2 overflow-x-auto pb-1" style="scrollbar-width:none;-ms-overflow-style:none">' +
      items.map(function (e) {
        return '<div data-ex-id="' + esc(e.id) + '" role="button" tabindex="0" class="shrink-0 w-[108px] mbr-card p-2.5 cursor-pointer active:scale-95 transition-transform">' +
          '<span class="w-8 h-8 rounded-lg bg-primary/10 border border-primary/25 flex items-center justify-center mb-1.5"><span class="material-symbols-outlined text-[18px] text-primary">' + esc(e.category_icon) + '</span></span>' +
          '<div class="text-[11px] font-semibold text-on-surface leading-tight line-clamp-2">' + esc(e.name) + '</div></div>';
      }).join('') + '</div></div>';

  function renderLibResults() {
    var box = document.getElementById('lib-results');
    if (!box) return;
    var lib = window.GymExerciseLibrary;
    var res = lib.search(LIBF);
    if (!res.length) {
      box.innerHTML = emptyState('search_off', 'No exercises found', LIBF.favoritesOnly ? 'You haven\'t starred any exercises matching these filters yet.' : 'Try clearing a filter or searching a different term.');
      return;
    }
    var isDefault = !LIBF.q && LIBF.category === 'All' && LIBF.equipment === 'All' && LIBF.difficulty === 'All' && !LIBF.favoritesOnly;
    box.innerHTML = (isDefault ? recentUsedHtml() : '') +
      '<div class="text-body-sm text-on-surface-variant mb-2 pl-1">' + res.length + ' exercise' + (res.length === 1 ? '' : 's') + '</div>' +
      res.map(libCard).join('');
    box.querySelectorAll('[data-ex-id]').forEach(function (c) {
      c.addEventListener('click', function () { openExerciseDetail(c.getAttribute('data-ex-id')); });
      c.addEventListener('keydown', function (e) { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openExerciseDetail(c.getAttribute('data-ex-id')); } });
    });
    box.querySelectorAll('[data-fav-id]').forEach(function (b) {
      b.addEventListener('click', function (e) {
        e.stopPropagation();
        var now = lib.toggleFavorite(b.getAttribute('data-fav-id'));
        window.toast(now ? 'Added to favorites ⭐' : 'Removed from favorites', now ? 'success' : 'info');
        renderLibResults();
      });
    });
  }

  function detailChip(icon, text) {
    return '<span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-lg bg-surface-container-highest border border-outline-variant/30 text-[11px] text-on-surface"><span class="material-symbols-outlined text-[14px] text-primary">' + icon + '</span>' + esc(text) + '</span>';
  }
  function detailList(title, icon, items, ordered, tone) {
    if (!items || !items.length) return '';
    var color = tone === 'error' ? 'text-error' : tone === 'tertiary' ? 'text-tertiary' : 'text-primary';
    var rows = items.map(function (it, i) {
      return '<li class="flex gap-2.5 py-1.5">' +
        (ordered
          ? '<span class="shrink-0 w-5 h-5 rounded-full bg-primary/15 text-primary text-[11px] font-bold flex items-center justify-center mt-0.5">' + (i + 1) + '</span>'
          : '<span class="material-symbols-outlined text-[16px] ' + color + ' mt-0.5 shrink-0">' + (tone === 'error' ? 'close' : 'check') + '</span>') +
        '<span class="text-body-md text-on-surface flex-1">' + esc(it) + '</span></li>';
    }).join('');
    return '<div class="mb-4"><div class="flex items-center gap-1.5 mb-1.5"><span class="material-symbols-outlined text-[17px] ' + color + '">' + icon + '</span>' +
      '<span class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest">' + title + '</span></div><ul>' + rows + '</ul></div>';
  }

  // opts.onAdd(ex) → shows an "ADD TO PLAN" action (used from the plan editor flow).
  function openExerciseDetail(id, opts) {
    opts = opts || {};
    var lib = window.GymExerciseLibrary;
    var e = lib.getById(id);

    if (window.GymMemberEngine) window.GymMemberEngine.trackExercise(e.id);
    var chips = [detailChip(e.category_icon, e.category), detailChip('fitness_center', e.equipment), detailChip('bolt', e.difficulty), detailChip('sync_alt', e.mechanic)].join('');
    var body =
      '<div class="flex flex-wrap gap-1.5 mb-4">' + chips + '</div>' +
      (e.description ? '<p class="text-body-md text-on-surface-variant mb-4">' + esc(e.description) + '</p>' : '') +
      // ── media placeholder — EXTENSION POINT (video/animation ship in a later phase) ──
      '<div class="mbr-card mb-4 overflow-hidden">' +
      '  <div class="w-full aspect-video bg-surface-container-highest flex flex-col items-center justify-center gap-1.5">' +
      '    <span class="material-symbols-outlined text-[34px] text-on-surface-variant/50">' + esc(e.category_icon) + '</span>' +
      '    <span class="text-[10px] text-on-surface-variant/70 uppercase tracking-widest">Video &amp; animation · coming soon</span>' +

      '<div class="flex flex-wrap gap-1.5">' + e.target_muscles.map(function (m, i) {
          return '<span class="px-2.5 py-1 rounded-full text-[12px] font-medium ' + (i === 0 ? 'bg-primary/15 text-primary border border-primary/30' : 'bg-surface-container-highest text-on-surface-variant border border-outline-variant/30') + '">' + esc(m) + (i === 0 ? ' •' : '') + '</span>';
        }).join('') + '</div></div>' +
      detailList('How to perform', 'list_alt', e.instructions, true, 'primary') +
      detailList('Common mistakes', 'error', e.common_mistakes, false, 'error') +
      detailList('Pro tips', 'lightbulb', e.tips, false, 'tertiary') +
      (aiOn() ? '<button id="ex-ai-btn" class="w-full mb-1 bg-primary/10 border border-primary/30 text-primary py-2.5 rounded-lg text-label-md font-semibold flex items-center justify-center gap-1.5 min-h-[44px]"><span class="material-symbols-outlined text-[18px]">auto_awesome</span>Explain with AI</button><div id="ex-ai-out"></div>' : '');

    var fav = lib.isFavorite(e.id);
    var foot =
      '<div class="flex gap-3">' +
      '  <button id="ex-fav" class="w-14 shrink-0 flex items-center justify-center rounded-lg border ' + (fav ? 'bg-tertiary/15 border-tertiary/40 text-tertiary' : 'bg-surface-container-low border-outline-variant/40 text-on-surface-variant') + ' min-h-[48px]"><span class="material-symbols-outlined text-[22px]" style="font-variation-settings: \'FILL\' ' + (fav ? '1' : '0') + ';">star</span></button>' +
      '  <div class="flex-1">' + primaryBtn('ex-add', opts.onAdd ? 'ADD TO PLAN' : 'ADD TO NEW PLAN', 'add') + '</div>' +
      '</div>';
    openSheet(esc(e.name), body, foot);

    document.getElementById('ex-fav').addEventListener('click', function () {
      var now = lib.toggleFavorite(e.id);
      var b = document.getElementById('ex-fav');
      b.className = 'w-14 shrink-0 flex items-center justify-center rounded-lg border ' + (now ? 'bg-tertiary/15 border-tertiary/40 text-tertiary' : 'bg-surface-container-low border-outline-variant/40 text-on-surface-variant') + ' min-h-[48px]';
      b.querySelector('.material-symbols-outlined').style.fontVariationSettings = "'FILL' " + (now ? '1' : '0');
      window.toast(now ? 'Added to favorites ⭐' : 'Removed from favorites', now ? 'success' : 'info');
      if (document.getElementById('lib-results')) renderLibResults();
    });
    document.getElementById('ex-add').addEventListener('click', function () {
      if (opts.onAdd) { opts.onAdd(e); closeSheet(); }
      else { closeSheet(); sheetPlanEditor(null, { exercises: [libToPlanExercise(e)] }); }
    });
    var exAi = document.getElementById('ex-ai-btn');
    if (exAi) exAi.addEventListener('click', function () {
      var out = document.getElementById('ex-ai-out');
      out.innerHTML = '<div class="flex items-center gap-2 text-body-sm text-on-surface-variant py-3"><div class="w-4 h-4 rounded-full border-2 border-primary/30 border-t-primary animate-spin"></div>Thinking…</div>';
      window.GymAI.service.explainExercise(e).then(function (r) { if (document.getElementById('ex-ai-out')) { out.innerHTML = renderAIResult(r); exAi.style.display = 'none'; } }).catch(function () { out.innerHTML = '<p class="text-body-sm text-on-surface-variant py-2">Try again.</p>'; });
    });
  }

  // Multi-select picker launched from the plan editor. Preserves the in-progress
  // draft, appends picks, then re-opens the editor.
  function readPlanDraft() {
    var name = (document.getElementById('pl-name') || {}).value || '';
    var day = (document.getElementById('pl-day') || {}).value || '';
    var exs = [];
    var box = document.getElementById('pl-ex');
    if (box) box.querySelectorAll('.ex-row').forEach(function (row) {
      var n = (row.querySelector('.ex-name').value || '').trim();
      if (!n) return;
      exs.push({
        name: n,
        muscle: row.getAttribute('data-muscle') || '',
        library_id: row.getAttribute('data-libid') || '',
        sets: Number(row.querySelector('.ex-sets').value) || 0,
        reps: Number(row.querySelector('.ex-reps').value) || 0,
        weight_kg: Number(row.querySelector('.ex-kg').value) || 0,
        rest_sec: Number(row.querySelector('.ex-rest').value) || 0
      });
    });
    return { name: name, day: day, exercises: exs };
  }

  function sheetLibraryPicker(plan, draft) {
    var lib = window.GymExerciseLibrary;
    var picked = {};
    var pf = { q: '', category: 'All', equipment: 'All', difficulty: 'All' };
    openSheet('Add from library',
      '<div class="relative mb-2.5">' +
      '  <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-[18px] text-on-surface-variant pointer-events-none">search</span>' +
      '  <input id="pk-q" type="search" autocomplete="off" placeholder="Search ' + lib.count + ' exercises" class="w-full bg-surface-container-lowest border border-outline-variant/40 rounded-lg pl-9 pr-3 py-2.5 text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none min-h-[44px]">' +
      '</div>' +
      '<div id="pk-cats" class="flex gap-2 overflow-x-auto pb-1 mb-1" style="scrollbar-width:none;-ms-overflow-style:none"></div>' +
      '<div id="pk-results" class="mt-1"></div>',
      '<div class="flex gap-3">' +
      '  <button id="pk-cancel" class="flex-1 bg-surface-container-low border border-outline-variant/40 text-on-surface-variant py-3.5 rounded-lg font-label-caps text-label-caps tracking-widest min-h-[48px]">CANCEL</button>' +
      '  <div class="flex-1">' + primaryBtn('pk-add', 'ADD', 'add') + '</div>' +
      '</div>');

    function updateAddBtn() {
      var n = Object.keys(picked).length;
      var span = document.querySelector('#pk-add span:last-child');
      if (span) span.textContent = n ? 'ADD ' + n : 'ADD';
    }
    var cats = ['All'].concat(lib.categories);
    document.getElementById('pk-cats').innerHTML = cats.map(function (c) {
      var on = c === pf.category;
      return '<button data-pcat="' + esc(c) + '" class="shrink-0 px-3 py-1.5 rounded-full text-[12px] font-semibold border transition-colors ' + (on ? 'bg-primary/15 border-primary/40 text-primary' : 'bg-surface-container-low border-outline-variant/30 text-on-surface-variant') + '">' + esc(c) + '</button>';
    }).join('');
    function renderPk() {
      var res = lib.search(pf);
      var box = document.getElementById('pk-results');
      if (!res.length) { box.innerHTML = '<p class="text-body-sm text-on-surface-variant text-center py-6">No matches — try another search.</p>'; return; }
      box.innerHTML = res.slice(0, 300).map(function (e) {
        var sel = !!picked[e.id];
        return '<button type="button" data-pick="' + esc(e.id) + '" class="w-full flex items-center gap-3 p-2.5 mb-2 rounded-lg border text-left transition-colors ' + (sel ? 'bg-primary/10 border-primary/40' : 'bg-surface-container-lowest border-outline-variant/30') + '">' +
          '<span class="w-9 h-9 rounded-lg bg-primary/10 border border-primary/25 flex items-center justify-center shrink-0"><span class="material-symbols-outlined text-[18px] text-primary">' + esc(e.category_icon) + '</span></span>' +
          '<span class="min-w-0 flex-1"><span class="block text-body-md font-semibold text-on-surface truncate">' + esc(e.name) + '</span>' +
          '<span class="block text-body-sm text-on-surface-variant truncate">' + esc(e.primary_muscle) + ' · ' + esc(e.equipment) + '</span></span>' +
          '<span class="w-6 h-6 rounded-full border-2 flex items-center justify-center shrink-0 ' + (sel ? 'bg-primary border-primary' : 'border-outline-variant') + '">' + (sel ? '<span class="material-symbols-outlined text-[15px] text-on-primary">check</span>' : '') + '</span>' +
          '</button>';
      }).join('');
      box.querySelectorAll('[data-pick]').forEach(function (b) {
        b.addEventListener('click', function () {
          var id = b.getAttribute('data-pick');
          if (picked[id]) delete picked[id]; else picked[id] = libToPlanExercise(lib.getById(id));
          renderPk(); updateAddBtn();
        });
      });
    }
    var pq = document.getElementById('pk-q');
    var pdeb;
    pq.addEventListener('input', function () { pf.q = pq.value; clearTimeout(pdeb); pdeb = setTimeout(renderPk, 130); });
    document.getElementById('pk-cats').querySelectorAll('[data-pcat]').forEach(function (b) {
      b.addEventListener('click', function () {
        pf.category = b.getAttribute('data-pcat');
        document.getElementById('pk-cats').querySelectorAll('[data-pcat]').forEach(function (x) {
          var on = x === b;
          x.className = 'shrink-0 px-3 py-1.5 rounded-full text-[12px] font-semibold border transition-colors ' + (on ? 'bg-primary/15 border-primary/40 text-primary' : 'bg-surface-container-low border-outline-variant/30 text-on-surface-variant');
        });
        renderPk();
      });
    });
    document.getElementById('pk-add').addEventListener('click', function () {
      var list = Object.keys(picked).map(function (k) { return picked[k]; });
      sheetPlanEditor(plan, { name: draft.name, day: draft.day, exercises: draft.exercises.concat(list) });
    });
    document.getElementById('pk-cancel').addEventListener('click', function () {
      sheetPlanEditor(plan, { name: draft.name, day: draft.day, exercises: draft.exercises });
    });
    renderPk();
  }

  // ── plan editor sheet ────────────────────────────────────
  var SET_TYPES = [['normal', 'Normal'], ['warmup', 'Warm-up'], ['dropset', 'Dropset']];
  function stBtnCls(on) { return 'px-2 py-1 text-[10px] font-semibold ' + (on ? 'bg-primary/15 text-primary' : 'text-on-surface-variant'); }
  function ssBtnCls(on) { return 'ex-ss px-2 py-1 rounded-md border text-[10px] font-semibold flex items-center gap-1 ' + (on ? 'bg-secondary/15 border-secondary/40 text-secondary' : 'border-outline-variant/30 text-on-surface-variant'); }
  function exerciseRowHtml(e, i) {
    e = e || {};
    var st = e.set_type || 'normal';
    return '<div class="ex-row bg-surface-container-lowest border border-outline-variant/30 rounded-lg p-3 mb-2.5" data-i="' + i + '" data-muscle="' + esc(e.muscle || '') + '" data-libid="' + esc(e.library_id || '') + '" data-settype="' + esc(st) + '" data-sslink="' + (e._sslink ? '1' : '0') + '">' +
      '<div class="flex items-center gap-2 mb-2">' +
      '  <input class="ex-name flex-1 bg-transparent border-b border-outline-variant/40 focus:border-primary outline-none px-1 py-1.5 text-body-md text-on-surface min-h-[38px]" placeholder="Exercise name" value="' + esc(e.name || '') + '">' +
      '  <button type="button" class="ex-del w-9 h-9 flex items-center justify-center rounded-full text-on-surface-variant hover:text-error" aria-label="Remove exercise"><span class="material-symbols-outlined text-[18px] pointer-events-none">close</span></button>' +
      '</div>' +
      (e.muscle ? '<div class="flex items-center gap-1 mb-2 -mt-1"><span class="material-symbols-outlined text-[13px] text-primary">exercise</span><span class="text-[11px] text-on-surface-variant">' + esc(e.muscle) + '</span></div>' : '') +
      '<div class="flex items-center gap-1.5 mb-2 flex-wrap">' +
      '  <div class="ex-settype flex rounded-md overflow-hidden border border-outline-variant/30">' +
      SET_TYPES.map(function (t) { return '<button type="button" data-st="' + t[0] + '" class="' + stBtnCls(st === t[0]) + '">' + t[1] + '</button>'; }).join('') +
      '  </div>' +
      (i > 0 ? '<button type="button" class="' + ssBtnCls(!!e._sslink) + '"><span class="material-symbols-outlined text-[13px] pointer-events-none">link</span>Superset</button>' : '') +
      '</div>' +
      '<div class="grid grid-cols-4 gap-2">' +
      '  <label class="block"><span class="text-[10px] text-on-surface-variant uppercase">Sets</span><input type="number" min="0" inputmode="numeric" class="ex-sets w-full bg-surface-container border border-outline-variant/30 rounded px-2 py-1.5 text-body-md text-on-surface min-h-[38px]" value="' + (e.sets || '') + '"></label>' +
      '  <label class="block"><span class="text-[10px] text-on-surface-variant uppercase">Reps</span><input type="number" min="0" inputmode="numeric" class="ex-reps w-full bg-surface-container border border-outline-variant/30 rounded px-2 py-1.5 text-body-md text-on-surface min-h-[38px]" value="' + (e.reps || '') + '"></label>' +
      '  <label class="block"><span class="text-[10px] text-on-surface-variant uppercase">Kg</span><input type="number" min="0" step="0.5" inputmode="decimal" class="ex-kg w-full bg-surface-container border border-outline-variant/30 rounded px-2 py-1.5 text-body-md text-on-surface min-h-[38px]" value="' + (e.weight_kg || '') + '"></label>' +
      '  <label class="block"><span class="text-[10px] text-on-surface-variant uppercase">Rest s</span><input type="number" min="0" inputmode="numeric" class="ex-rest w-full bg-surface-container border border-outline-variant/30 rounded px-2 py-1.5 text-body-md text-on-surface min-h-[38px]" value="' + (e.rest_sec || '') + '"></label>' +

  // override (optional): { name, day, exercises[] } — used to re-open the editor
  // from the library picker with the in-progress draft + freshly picked rows.
  function sheetPlanEditor(plan, override) {
    var ex = (override && Array.isArray(override.exercises)) ? override.exercises
           : ((plan && Array.isArray(plan.exercises)) ? plan.exercises : []);
    // Reconstruct "superset with previous" from stored group ids for the editor.
    ex.forEach(function (e, i) { e._sslink = (i > 0 && e.superset_group && ex[i - 1].superset_group === e.superset_group) ? 1 : 0; });
    var initName = (override && override.name != null) ? override.name : ((plan && plan.name) || '');
    var initDay = (override && override.day != null) ? override.day : ((plan && plan.day_of_week) || '');
    var hasLib = !!window.GymExerciseLibrary;
    var dayOpts = '<option value="">Any day</option>' + DAY_KEYS.map(function (k, i) {
      return '<option value="' + k + '"' + (initDay === k ? ' selected' : '') + '>' + DAY_LABELS[i] + '</option>';
    }).join('');
    openSheet(plan ? 'Edit plan' : 'New workout plan',
      inputField('pl-name', 'Plan name', { value: initName, placeholder: 'e.g. Push Day' }) +
      '<label class="block mb-4"><span class="block font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest mb-1.5">Day</span>' +
      '<select id="pl-day" class="w-full bg-surface-container-lowest border border-outline-variant/40 rounded-lg px-3.5 py-3 text-body-lg text-on-surface min-h-[48px]">' + dayOpts + '</select></label>' +
      '<div class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest mb-2">Exercises</div>' +
      '<div id="pl-ex">' + ex.map(exerciseRowHtml).join('') + '</div>' +
      (hasLib
        ? '<div class="grid grid-cols-2 gap-2">' +
          '  <button type="button" id="pl-lib" class="border border-primary/40 bg-primary/10 text-primary py-2.5 rounded-lg text-label-md font-semibold flex items-center justify-center gap-1.5 min-h-[44px]"><span class="material-symbols-outlined text-[18px]">library_books</span>Library</button>' +
          '  <button type="button" id="pl-addex" class="border border-dashed border-outline-variant/60 text-on-surface-variant py-2.5 rounded-lg text-label-md font-semibold flex items-center justify-center gap-1.5 hover:border-primary hover:text-primary min-h-[44px]"><span class="material-symbols-outlined text-[18px]">add</span>Custom</button>' +
          '</div>'
        : '<button type="button" id="pl-addex" class="w-full border border-dashed border-outline-variant/60 text-on-surface-variant py-2.5 rounded-lg text-label-md font-semibold flex items-center justify-center gap-1.5 hover:border-primary hover:text-primary min-h-[44px]"><span class="material-symbols-outlined text-[18px]">add</span>Add exercise</button>'),
      primaryBtn('pl-save', plan ? 'SAVE CHANGES' : 'CREATE PLAN', 'check'));

    var exBox = document.getElementById('pl-ex');
    function bindRows() {
      exBox.querySelectorAll('.ex-row').forEach(function (row) {
        var del = row.querySelector('.ex-del');
        if (del) del.onclick = function () { row.remove(); };
        row.querySelectorAll('.ex-settype [data-st]').forEach(function (b) {
          b.onclick = function () {
            row.setAttribute('data-settype', b.getAttribute('data-st'));
            row.querySelectorAll('.ex-settype [data-st]').forEach(function (x) { x.className = stBtnCls(x === b); });
          };
        });
        var ss = row.querySelector('.ex-ss');
        if (ss) ss.onclick = function () {
          var on = row.getAttribute('data-sslink') !== '1';
          row.setAttribute('data-sslink', on ? '1' : '0');
          ss.className = ssBtnCls(on);
        };
      });
    }
    bindRows();
