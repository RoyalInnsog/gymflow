<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gym Flow - Express Check-In</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link href="/assets/css/shared.css" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/tailwind.css">
  <script src="/assets/js/designSystem.js"></script>

  <style>
    body {
      background-color: #0f1014;
      background-image: 
        radial-gradient(at 50% 0%, rgba(22, 200, 238, 0.1) 0px, transparent 60%),
        radial-gradient(at 50% 100%, rgba(0, 255, 170, 0.05) 0px, transparent 60%);
    }
  </style>
</head>
<body class="min-h-screen text-on-surface font-body-md antialiased flex flex-col items-center justify-center p-4">

  <div class="w-full max-w-sm bg-surface-container/60 backdrop-blur-xl border border-outline-variant/30 rounded-3xl p-8 shadow-2xl flex flex-col relative overflow-hidden text-center">
    <!-- Brand / Logo -->
    <div class="flex justify-center mb-6">
      <div class="h-16 w-16 flex items-center justify-center rounded-2xl bg-surface-container-highest border border-outline-variant/50 shadow-inner">
        <span class="material-symbols-outlined text-4xl text-primary" style="font-variation-settings: 'FILL' 1;">how_to_reg</span>
      </div>
    </div>
    
    <h1 class="font-headline-md text-on-surface mb-2 font-bold">Gym Check-In</h1>
    <p class="font-body-sm text-on-surface-variant mb-8" id="status-text">Enter your registered phone number to mark your attendance.</p>
    
    <form id="checkin-form" class="flex flex-col gap-4">
      <div class="relative flex items-center">
        <span class="material-symbols-outlined absolute left-4 text-on-surface-variant/70 text-[20px] pointer-events-none">phone</span>
        <input class="w-full bg-surface-container-lowest border border-outline-variant/40 rounded-xl py-3.5 pl-12 pr-4 font-body-lg text-on-surface placeholder:text-on-surface-variant/40 focus:border-primary focus:ring-1 focus:ring-primary/50 transition-all outline-none shadow-inner text-center tracking-wider" id="phone" name="phone" placeholder="e.g. 9876543210" required="" type="tel">
      </div>
      
      <button type="submit" id="submit-btn" class="w-full bg-primary text-on-primary hover:opacity-90 py-3.5 rounded-xl font-label-lg font-semibold transition-all shadow-md focus-visible:ring-2 focus-visible:ring-primary focus-visible:outline-none flex items-center justify-center gap-2">
        <span class="material-symbols-outlined text-[20px]">check_circle</span> Check In Now
      </button>
    </form>
    
    <div id="success-view" class="hidden flex-col items-center justify-center py-4">
      <span class="material-symbols-outlined text-6xl text-secondary mb-4 drop-shadow-md" style="font-variation-settings: 'FILL' 1;">task_alt</span>
      <h2 class="font-headline-sm text-on-surface font-bold">Checked In!</h2>
      <p class="font-body-sm text-on-surface-variant mt-2" id="success-msg">Enjoy your workout.</p>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('t');
      const gym = urlParams.get('gym');
      
      const form = document.getElementById('checkin-form');
      const phoneInput = document.getElementById('phone');
      const submitBtn = document.getElementById('submit-btn');
      const statusText = document.getElementById('status-text');
      const successView = document.getElementById('success-view');
      
      if (!token || !gym) {
        form.classList.add('hidden');
        statusText.textContent = "Invalid or missing check-in QR code. Please scan the QR code at the front desk.";
        statusText.classList.add('text-error');
        return;
      }
      
      // Auto-fill phone if saved
      const savedPhone = localStorage.getItem('gymflow_member_phone');
      if (savedPhone) {
        phoneInput.value = savedPhone;
      }
      
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const phone = phoneInput.value.trim();
        if (!phone) return;
        
        localStorage.setItem('gymflow_member_phone', phone);
        
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> Processing...';
        
        try {
          const response = await fetch('/api/attendance/kiosk-checkin', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, tenant_id: gym, phone })
          });
          
          const data = await response.json();
          
          if (!response.ok) {
            throw new Error(data.error || 'Check-in failed');
          }
          
          form.classList.add('hidden');
          statusText.classList.add('hidden');
          successView.classList.remove('hidden');
          successView.classList.add('flex');
          if (data.message) {
            document.getElementById('success-msg').textContent = data.message;
          }
        } catch (err) {
          alert(err.message);
          submitBtn.disabled = false;
          submitBtn.innerHTML = '<span class="material-symbols-outlined text-[20px]">check_circle</span> Check In Now';
        }
      });
    });
  </script>
</body>
</html>
