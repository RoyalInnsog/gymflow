  // ════════════════════════════════════════════════════════
  // GPS Geolocation & Geofencing System (Capacitor/Mobile native)
  // ════════════════════════════════════════════════════════
  function calculateHaversineDistance(lat1, lon1, lat2, lon2) {
    const R = 6371e3; // meters
    const phi1 = (lat1 * Math.PI) / 180;
    const phi2 = (lat2 * Math.PI) / 180;
    const dPhi = ((lat2 - lat1) * Math.PI) / 180;
    const dLon = ((lon2 - lon1) * Math.PI) / 180;
    const a = Math.sin(dPhi / 2) * Math.sin(dPhi / 2) +
              Math.cos(phi1) * Math.cos(phi2) *
              Math.sin(dLon / 2) * Math.sin(dLon / 2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    return R * c;
  }

  async function getCurrentGPSPosition() {
    const geo = window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.Geolocation;
    if (geo) {
      const perm = await geo.checkPermissions();
      if (perm.location !== 'granted') {
        const req = await geo.requestPermissions();
        if (req.location !== 'granted') {
          throw new Error('PERMISSION_DENIED');
        }
      }
      return await geo.getCurrentPosition({ enableHighAccuracy: true, timeout: 10000 });
    } else {
      return new Promise(function (resolve, reject) {
        if (!navigator.geolocation) {
          return reject(new Error('GEOLOCATION_NOT_SUPPORTED'));
        }
        navigator.geolocation.getCurrentPosition(
          resolve,
          function (err) {
            if (err.code === 1) reject(new Error('PERMISSION_DENIED'));
            else reject(new Error('TIMEOUT_OR_POOR_LOCK'));
          },
          { enableHighAccuracy: true, timeout: 10000 }
        );
      });
    }
  }

  function getOfflineQueue() {
    try {
      return JSON.parse(localStorage.getItem('GPS_OFFLINE_QUEUE') || '[]');
    } catch (e) {
      return [];
    }
  }

  function queueOfflineCheckin(lat, lon, ts, isMocked) {
    const queue = getOfflineQueue();
    queue.push({ latitude: lat, longitude: lon, timestamp: ts, isMocked: !!isMocked });
    localStorage.setItem('GPS_OFFLINE_QUEUE', JSON.stringify(queue));
  }

  async function syncOfflineCheckins() {
    if (!navigator.onLine) return;
    const queue = getOfflineQueue();
    if (queue.length === 0) return;

    console.log('[GPS Attendance] Syncing ' + queue.length + ' queued offline check-in(s)...');
    const remaining = [];

    for (var i = 0; i < queue.length; i++) {
      var item = queue[i];
      try {
        await window.api.post('/attendance/checkin', item);
        console.log('[GPS Attendance] Offline check-in synced successfully.');
      } catch (err) {
        console.error('[GPS Attendance] Sync failed:', err);
        if (err.status && err.status >= 400 && err.status < 500) {
          // Discard permanent errors
        } else {
          remaining.push(item);
        }
      }
    }
    localStorage.setItem('GPS_OFFLINE_QUEUE', JSON.stringify(remaining));
  }

  window.addEventListener('online', syncOfflineCheckins);

  async function runGPSCheckinFlow(cardEl) {
    const statusText = cardEl.querySelector('#gps-status-text');
    const actionArea = cardEl.querySelector('#gps-action-area');

    statusText.textContent = 'Acquiring satellite lock...';
    actionArea.innerHTML = '<div class="flex items-center justify-center py-2"><div class="spinner" style="margin: 0; width: 22px; height: 22px;"></div></div>';

    try {
      if (navigator.onLine) {
        await syncOfflineCheckins();
      }

      const pos = await getCurrentGPSPosition();
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;
      const isMocked = pos.coords.isMocked || pos.androidMocked || false;
      const timestamp = pos.timestamp || Date.now();

      const gymLat = S.overview && S.overview.gym_latitude;
      const gymLon = S.overview && S.overview.gym_longitude;
      const gymRadius = S.overview && S.overview.geofence_radius || 50;
      const gymName = S.overview && S.overview.gym_name || 'the gym';

      if (gymLat === undefined || gymLat === null || gymLon === undefined || gymLon === null) {
        statusText.textContent = 'Geofencing parameters missing.';
        actionArea.innerHTML = '<div class="text-body-sm text-error bg-error/10 border border-error/20 p-2.5 rounded-lg text-center font-medium">Gym coordinates not configured. Contact admin.</div>';
        return;
      }

      if (isMocked) {
        statusText.textContent = 'GPS spoofing detected.';
        actionArea.innerHTML = '<div class="text-body-sm text-error bg-error/10 border border-error/20 p-2.5 rounded-lg text-center font-medium">Check-in rejected: Fake locations are prohibited.</div>';
        return;
      }

      const distance = calculateHaversineDistance(lat, lon, gymLat, gymLon);
      const isInside = distance <= gymRadius;

      if (isInside) {
        statusText.textContent = 'Inside radius · Distance: ' + Math.round(distance) + 'm';
        actionArea.innerHTML = '<button id="btn-gps-checkin" class="w-full bg-primary hover:bg-primary/90 text-on-primary font-semibold py-2.5 px-4 rounded-lg shadow transition active:scale-[0.99] flex items-center justify-center gap-2">' +
          '<span class="material-symbols-outlined text-[20px]">how_to_reg</span> Check In Now</button>';

        cardEl.querySelector('#btn-gps-checkin').onclick = async function () {
          const btn = this;
          btn.disabled = true;
          btn.innerHTML = '<div class="spinner" style="margin: 0; width: 18px; height: 18px; border-top-color: #000;"></div> Checking in...';

          const payload = { latitude: lat, longitude: lon, timestamp: timestamp, isMocked: isMocked };

          if (!navigator.onLine) {
            queueOfflineCheckin(lat, lon, timestamp, isMocked);
            statusText.textContent = 'Offline check-in queued!';
            actionArea.innerHTML = '<div class="bg-primary/15 border border-primary/25 text-primary rounded-lg p-3 text-body-sm text-center font-semibold">Offline check-in saved! It will sync automatically once you connect to the internet.</div>';
            return;
          }

          try {
            const res = await window.api.post('/attendance/checkin', payload);
            statusText.textContent = 'Check-in confirmed!';
            actionArea.innerHTML = '<div class="bg-secondary/15 border border-secondary/25 text-secondary rounded-lg p-3 text-body-sm text-center font-bold">' + esc(res.message) + '</div>';
            
            // Re-render attendance list after small delay
            setTimeout(function () {
              if (S.view === 'attendance') viewAttendance(document.getElementById('view-root'));
            }, 2500);
          } catch (err) {
            btn.disabled = false;
            btn.innerHTML = '<span class="material-symbols-outlined text-[20px]">how_to_reg</span> Check In Now';
            statusText.textContent = 'Check-in validation failure.';
            actionArea.innerHTML = '<div class="text-body-sm text-error bg-error/5 border border-error/15 p-2.5 rounded-lg text-center font-medium mb-2">' + esc(err.error || 'Server validation rejected.') + '</div>' +
              '<button id="btn-gps-retry" class="w-full bg-surface-container hover:bg-surface-variant text-on-surface font-semibold py-2 px-4 rounded-lg text-body-sm transition">Try Again</button>';
            actionArea.querySelector('#btn-gps-retry').onclick = function () { runGPSCheckinFlow(cardEl); };
          }
        };
      } else {
        statusText.textContent = 'Too far from gym · Distance: ' + Math.round(distance) + 'm';
        actionArea.innerHTML = '<div class="text-body-sm text-on-surface-variant bg-surface-container-low border border-outline-variant/30 rounded-lg p-3 text-center mb-2">You are ' + Math.round(distance) + 'm away. Allowed radius is ' + gymRadius + 'm.</div>' +

        actionArea.querySelector('#btn-gps-retry').onclick = function () { runGPSCheckinFlow(cardEl); };
      }

    } catch (err) {
      console.error(err);
      let errMsg = 'Satellite lock failed.';
      if (err.message === 'PERMISSION_DENIED') {
        errMsg = 'Location permission is denied.';
        statusText.textContent = errMsg;
        actionArea.innerHTML = '<div class="text-body-sm text-on-surface-variant mb-2 text-center">Please enable location services and grant permissions to check in.</div>' +

        actionArea.querySelector('#btn-gps-grant').onclick = function () { runGPSCheckinFlow(cardEl); };
      } else {
        if (err.message === 'TIMEOUT_OR_POOR_LOCK') {
          errMsg = 'Poor satellite lock or timeout.';
        }
        statusText.textContent = errMsg;
        actionArea.innerHTML = '<button id="btn-gps-retry" class="w-full bg-surface-container hover:bg-surface-variant text-on-surface font-semibold py-2.5 px-4 rounded-lg transition flex items-center justify-center gap-1.5 text-body-sm">' +
          '<span class="material-symbols-outlined text-[18px]">refresh</span> Retry Check-In</button>';
        actionArea.querySelector('#btn-gps-retry').onclick = function () { runGPSCheckinFlow(cardEl); };
      }
    }
  }

  function statTile(icon, color, value, label) {
    return '<div class="mbr-card p-3.5 text-center">' +
      '<span class="material-symbols-outlined text-' + color + ' text-[20px]">' + icon + '</span>' +

      '<div class="text-[10px] text-on-surface-variant uppercase tracking-wider mt-1">' + label + '</div></div>';
  }

  function calendarHtml(cursor, attSet) {
    var y = cursor.getFullYear(), m = cursor.getMonth();
    var firstDow = (new Date(y, m, 1).getDay() + 6) % 7; // Mon=0
    var daysIn = new Date(y, m + 1, 0).getDate();
    var today = todayStr();
    var h = '<div class="cal-grid mb-1">' + DAY_LABELS.map(function (d) {
      return '<div class="text-center text-[10px] text-on-surface-variant uppercase font-semibold py-1">' + d[0] + '</div>';
    }).join('') + '</div><div class="cal-grid">';
    for (var b = 0; b < firstDow; b++) h += '<div></div>';
    for (var d = 1; d <= daysIn; d++) {
      var ds = y + '-' + String(m + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
      var hit = attSet[ds];
      var isToday = ds === today;
      h += '<div class="cal-cell ' + (hit ? 'bg-primary/15 text-primary font-bold' : 'text-on-surface-variant') + (isToday ? ' ring-1 ring-primary' : '') + '">' +
        '<span>' + d + '</span>' +
        (hit ? '<span class="w-1 h-1 rounded-full bg-primary"></span>' : '') +
        '</div>';
    }
    return h + '</div>';
  }

  function heatmapHtml(attSet) {
    // 12 columns (weeks, oldest→newest), 7 rows (Mon..Sun)
    var now = new Date(); now.setHours(0, 0, 0, 0);
    var dow = (now.getDay() + 6) % 7;
    var end = new Date(now); end.setDate(end.getDate() + (6 - dow)); // this week's Sunday
    var cells = '';
    for (var wI = 11; wI >= 0; wI--) {
      for (var dI = 0; dI < 7; dI++) {
        var cd = new Date(end); cd.setDate(end.getDate() - wI * 7 - (6 - dI));
        var ds = dstr(cd);
        var future = cd > now;
        cells += '<div class="heat-cell ' + (future ? 'opacity-0' : (attSet[ds] ? 'bg-primary' : 'bg-surface-container-highest border border-outline-variant/20')) + '" title="' + ds + '"></div>';
      }
    }
    return '<div class="heat-grid">' + cells + '</div>' +
      '<div class="flex items-center gap-2 mt-3 text-[10px] text-on-surface-variant"><span>Less</span><span class="heat-cell bg-surface-container-highest border border-outline-variant/20"></span><span class="heat-cell bg-primary"></span><span>More</span></div>';
  }

  function weekBuckets(n) {
    // last n weeks; returns [{label, start, end}]
    var out = [];
    var now = new Date(); now.setHours(0, 0, 0, 0);
    var dow = (now.getDay() + 6) % 7;
    var monday = new Date(now); monday.setDate(now.getDate() - dow);
    for (var i = n - 1; i >= 0; i--) {
      var s = new Date(monday); s.setDate(monday.getDate() - i * 7);
      var e = new Date(s); e.setDate(s.getDate() + 6);
      out.push({ label: s.getDate() + '/' + (s.getMonth() + 1), s: dstr(s), e: dstr(e) });
    }
    return out;
  }

  function getFieldUnit(field) {
    if (field === 'bodyfat') {
      return localStorage.getItem('gf.member.unit.bodyfat') || '%';
    }
    if (field === 'height') {
      return localStorage.getItem('gf.member.unit.height') || 'cm';
    }
    return localStorage.getItem('gf.member.unit.' + field) || 'cm';
  }

  function setFieldUnit(field, unit) {
    localStorage.setItem('gf.member.unit.' + field, unit);
  }

  function formatDim(val, field, weightVal) {
    if (val === null || val === undefined || val === '') return '—';
    var unit = getFieldUnit(field);
    if (field === 'bodyfat') {
      if (unit === 'kg') {
        return weightVal ? (weightVal * num(val) / 100).toFixed(1) + ' kg' : '—';
      }
      return num(val).toFixed(1) + '%';
    }
    if (unit === 'in') {
      return (num(val) / 2.54).toFixed(1) + ' in';
    }
    return num(val).toFixed(0) + ' cm';
  }

      } else noData('ch-weight', 'Log your weight at least twice to see the trend.');

      // Attendance / week
      var attSet = attendanceDates(attendance);
      var wks = weekBuckets(8);
      var attData = wks.map(function (w) {
        var n = 0; Object.keys(attSet).forEach(function (d) { if (d >= w.s && d <= w.e) n++; }); return n;
      });
      if (attendance.length) {
        mkChart('ch-att', { type: 'bar', data: { labels: wks.map(function (w) { return w.label; }), datasets: [{ data: attData, backgroundColor: c.primary + 'CC', borderRadius: 6, maxBarThickness: 22 }] }, options: baseOpts(c) });
      } else noData('ch-att', 'No check-ins yet.');

      // Workout sessions / week
      var sesData = wks.map(function (w) {
        return sessions.filter(function (s) { var d = s.session_date || ''; return d >= w.s && d <= w.e; }).length;
      });
      if (sessions.length) {
        mkChart('ch-workout', { type: 'bar', data: { labels: wks.map(function (w) { return w.label; }), datasets: [{ data: sesData, backgroundColor: c.secondary + 'CC', borderRadius: 6, maxBarThickness: 22 }] }, options: baseOpts(c) });
      } else noData('ch-workout', 'Finish a workout to start tracking consistency.');

      // Water / calories last 7 days
      var days7 = [];
      for (var i = 6; i >= 0; i--) { var dd = new Date(); dd.setDate(dd.getDate() - i); days7.push(dstr(dd)); }
      var anyWater = days7.some(function (d) { return byDate[d] && byDate[d].water_ml; });
      if (anyWater) {
        mkChart('ch-water', { type: 'bar', data: { labels: days7.map(function (d) { return d.slice(8); }), datasets: [{ data: days7.map(function (d) { return byDate[d] ? num(byDate[d].water_ml) : 0; }), backgroundColor: c.primary + 'CC', borderRadius: 6, maxBarThickness: 26 }] }, options: baseOpts(c) });
      } else noData('ch-water', 'Tap +250ml on Home to start tracking water.');
      var anyCal = days7.some(function (d) { return byDate[d] && byDate[d].calories; });
      if (anyCal) {
        mkChart('ch-cal', { type: 'bar', data: { labels: days7.map(function (d) { return d.slice(8); }), datasets: [{ data: days7.map(function (d) { return byDate[d] ? num(byDate[d].calories) : 0; }), backgroundColor: c.tertiary + 'CC', borderRadius: 6, maxBarThickness: 26 }] }, options: baseOpts(c) });
      } else noData('ch-cal', 'Log calories on Home to see this chart.');

      // Medical metrics (steps / sleep / heart rate) — drawn ONLY when a real
      // device is bound, so the cards above exist. No device → no fabricated data.
      if (Wearables.hasBoundDevice()) {
        // Steps chart (Health Connect)
        var anySteps = days7.some(function (d) { return byDate[d] && byDate[d].steps; });
        if (anySteps) {
          mkChart('ch-steps', { type: 'line', data: { labels: days7.map(function (d) { return d.slice(8); }), datasets: [{ label: 'Steps', data: days7.map(function (d) { return byDate[d] ? num(byDate[d].steps) : 0; }), borderColor: c.primary, backgroundColor: c.primary + '22', fill: true, tension: 0.3, pointRadius: 3, borderWidth: 2 }] }, options: baseOpts(c) });
        } else noData('ch-steps', 'Waiting for step data from your connected device.');

        // Sleep chart (Health Connect)
        var anySleep = days7.some(function (d) { return byDate[d] && byDate[d].sleep_minutes; });
        if (anySleep) {
          mkChart('ch-sleep', { type: 'bar', data: { labels: days7.map(function (d) { return d.slice(8); }), datasets: [{ label: 'Sleep Hours', data: days7.map(function (d) { return byDate[d] ? (num(byDate[d].sleep_minutes) / 60).toFixed(1) : 0; }), backgroundColor: c.secondary + 'CC', borderRadius: 6, maxBarThickness: 26 }] }, options: baseOpts(c) });
        } else noData('ch-sleep', 'Waiting for sleep data from your connected device.');

        // Heart Rate chart (Health Connect)
        var anyHr = days7.some(function (d) { return byDate[d] && byDate[d].heart_rate; });
        if (anyHr) {
          mkChart('ch-hr', { type: 'line', data: { labels: days7.map(function (d) { return d.slice(8); }), datasets: [{ label: 'Heart Rate (bpm)', data: days7.map(function (d) { return byDate[d] ? num(byDate[d].heart_rate) : 0; }), borderColor: c.tertiary, backgroundColor: c.tertiary + '22', fill: true, tension: 0.35, pointRadius: 3, borderWidth: 2 }] }, options: baseOpts(c) });
        } else noData('ch-hr', 'Waiting for heart-rate data from your connected device.');
      }

      // Measurements (waist + chest lines)
      var mRows = meas.slice().sort(function (a, b) { return String(a.measured_on || '').localeCompare(String(b.measured_on || '')); });
      if (mRows.length >= 2) {
        mkChart('ch-meas', {
          type: 'line',
          data: {
            labels: mRows.map(function (r) { return String(r.measured_on || '').slice(5); }),
            datasets: [
              { label: 'Waist', data: mRows.map(function (r) { return r.waist_cm; }), borderColor: c.tertiary, tension: 0.3, pointRadius: 2, borderWidth: 2, spanGaps: true },
              { label: 'Chest', data: mRows.map(function (r) { return r.chest_cm; }), borderColor: c.primary, tension: 0.3, pointRadius: 2, borderWidth: 2, spanGaps: true }
            ]
          },
          options: (function (o) { o.plugins.legend = { display: true, labels: { color: c.text, boxWidth: 10, font: { size: 10 } } }; o.scales.y.beginAtZero = false; return o; })(baseOpts(c))
        });
      } else noData('ch-meas', 'Add two measurements to compare over time.');

      // PR history — heaviest lift per date for the most-logged exercise
      if (prs.length) {
        var byEx = {};
        prs.forEach(function (r) { (byEx[r.exercise] = byEx[r.exercise] || []).push(r); });
        var top = Object.keys(byEx).sort(function (a, b) { return byEx[b].length - byEx[a].length; })[0];
        var rows = byEx[top].slice().sort(function (a, b) { return String(a.achieved_on || '').localeCompare(String(b.achieved_on || '')); });
        mkChart('ch-pr', {
          type: 'line',
          data: { labels: rows.map(function (r) { return String(r.achieved_on || '').slice(5); }), datasets: [{ label: top, data: rows.map(function (r) { return num(r.weight_kg); }), borderColor: c.tertiary, backgroundColor: c.tertiary + '22', fill: true, stepped: true, pointRadius: 3, borderWidth: 2 }] },
          options: (function (o) { o.plugins.legend = { display: true, labels: { color: c.text, boxWidth: 10, font: { size: 10 } } }; o.scales.y.beginAtZero = false; return o; })(baseOpts(c))
        });
      } else noData('ch-pr', 'Add a personal record in Workout → Records.');
    });
  }

  // ── Local body metrics (Section 4) — height/shoulders/body-fat live on-device
  // (the synced measurements table has no columns for them). BMI is derived.
  function getHeight() { try { var v = localStorage.getItem('gf.member.heightCm'); return v ? Number(v) : null; } catch (e) { return null; } }
  function setHeight(v) { try { if (v) localStorage.setItem('gf.member.heightCm', String(v)); } catch (e) {} }
  function getBodyExtra() { try { return JSON.parse(localStorage.getItem('gf.member.bodyExtra')) || {}; } catch (e) { return {}; } }
  function saveBodyExtra(date, fields) {
    var m = getBodyExtra(), cur = m[date] || {};
    Object.keys(fields).forEach(function (k) { if (fields[k] != null) cur[k] = fields[k]; });
    m[date] = cur;
    try { localStorage.setItem('gf.member.bodyExtra', JSON.stringify(m)); } catch (e) {}
  }
  function latestBodyExtra(field) {
    var m = getBodyExtra(), dates = Object.keys(m).sort().reverse();
    for (var i = 0; i < dates.length; i++) if (m[dates[i]][field] != null) return { date: dates[i], value: m[dates[i]][field] };
    return null;
  }
  function bmiCategory(bmi) {
    if (bmi < 18.5) return { label: 'Underweight', color: 'tertiary' };
    if (bmi < 25) return { label: 'Normal', color: 'secondary' };
    if (bmi < 30) return { label: 'Overweight', color: 'tertiary' };
    return { label: 'Obese', color: 'error' };
  }

  function inputFieldWithToggle(id, label, opts, currentUnit, fieldKey) {

    return '<label class="block mb-3">' +
      '<div class="flex items-center justify-between mb-1.5">' +
      '  <span class="block font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest text-[9px]">' + label + '</span>' +
      '  ' + toggleBtn +
      '</div>' +
      '<input id="' + id + '" type="' + (opts.type || 'text') + '" ' + (opts.step ? 'step="' + opts.step + '" ' : '') +
      (opts.min !== undefined ? 'min="' + opts.min + '" ' : '') + (opts.inputmode ? 'inputmode="' + opts.inputmode + '" ' : '') +
      'value="' + (opts.value !== undefined && opts.value !== null ? esc(String(opts.value)) : '') + '" placeholder="' + (opts.placeholder || '') + '" ' +
      'class="w-full bg-surface-container-lowest border border-outline-variant/40 rounded-lg px-3 py-2 text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none min-h-[40px]">' +
      '</label>';
  }

  function inputFieldWithoutToggle(id, label, opts) {
    opts = opts || {};
    return '<label class="block mb-3">' +
      '<span class="block font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest text-[9px] mb-1.5">' + label + '</span>' +
      '<input id="' + id + '" type="' + (opts.type || 'text') + '" ' + (opts.step ? 'step="' + opts.step + '" ' : '') +
      (opts.min !== undefined ? 'min="' + opts.min + '" ' : '') + (opts.inputmode ? 'inputmode="' + opts.inputmode + '" ' : '') +
      'value="' + (opts.value !== undefined && opts.value !== null ? esc(String(opts.value)) : '') + '" placeholder="' + (opts.placeholder || '') + '" ' +
      'class="w-full bg-surface-container-lowest border border-outline-variant/40 rounded-lg px-3 py-2 text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none min-h-[40px]">' +
      '</label>';
  }

  function sheetAddMeasurement() {
    var h = getHeight();
    
    Promise.all([
      repos().health.list(),
      repos().measurements.list()
    ]).then(function(res) {
      var health = res[0] || [];
      var byDate = mergeHealthByDate(health);
      var latestWp = latestHealthValue(byDate, 'weight_kg');
      var weightVal = latestWp ? num(latestWp.value) : null;
      
      var latestMn = latestBodyExtra('masculine_number');
      var mnVal = latestMn ? num(latestMn.value) : '';

      var units = {
        chest: getFieldUnit('chest'),
        shoulders: getFieldUnit('shoulders'),
        waist: getFieldUnit('waist'),
        hips: getFieldUnit('hips'),
        arms: getFieldUnit('arms'),
        forearms: getFieldUnit('forearms'),
        eyes: getFieldUnit('eyes'),
        thighs: getFieldUnit('thighs'),
        calves: getFieldUnit('calves'),
        neck: getFieldUnit('neck'),
        bodyfat: getFieldUnit('bodyfat'),
        height: getFieldUnit('height')
      };

      var currentValues = {
        chest: '',
        shoulders: '',
        waist: '',
        hips: '',
        arms: '',
        forearms: '',
        eyes: '',
        thighs: '',
        calves: '',
        neck: '',
        bodyfat: '',
        masculine: mnVal,
        height_cm: h ? String(h) : '',
        height_ft: '',
        height_in: ''
      };
      
      if (h) {
        var totalInches = h / 2.54;
        currentValues.height_ft = String(Math.floor(totalInches / 12));
        currentValues.height_in = String(Math.round((totalInches % 12) * 10) / 10);
      }

      function drawForm() {
        var bodyHtml = '<div class="grid grid-cols-2 gap-x-4 gap-y-1">';

        bodyHtml += inputFieldWithToggle('bm-chest', 'Chest', { type: 'number', step: '0.1', inputmode: 'decimal', value: currentValues.chest }, units.chest, 'chest');
        bodyHtml += inputFieldWithToggle('bm-shoulders', 'Shoulders', { type: 'number', step: '0.1', inputmode: 'decimal', value: currentValues.shoulders }, units.shoulders, 'shoulders');
        bodyHtml += inputFieldWithToggle('bm-waist', 'Waist', { type: 'number', step: '0.1', inputmode: 'decimal', value: currentValues.waist }, units.waist, 'waist');
        bodyHtml += inputFieldWithToggle('bm-hips', 'Hips', { type: 'number', step: '0.1', inputmode: 'decimal', value: currentValues.hips }, units.hips, 'hips');
        bodyHtml += inputFieldWithToggle('bm-biceps', 'Arms', { type: 'number', step: '0.1', inputmode: 'decimal', value: currentValues.arms }, units.arms, 'arms');
        bodyHtml += inputFieldWithToggle('bm-forearms', 'Forearms', { type: 'number', step: '0.1', inputmode: 'decimal', value: currentValues.forearms }, units.forearms, 'forearms');
        bodyHtml += inputFieldWithToggle('bm-eyes', 'Eyes', { type: 'number', step: '0.1', inputmode: 'decimal', value: currentValues.eyes }, units.eyes, 'eyes');
        bodyHtml += inputFieldWithToggle('bm-thigh', 'Thighs', { type: 'number', step: '0.1', inputmode: 'decimal', value: currentValues.thighs }, units.thighs, 'thighs');
        bodyHtml += inputFieldWithToggle('bm-calves', 'Calves', { type: 'number', step: '0.1', inputmode: 'decimal', value: currentValues.calves }, units.calves, 'calves');
        bodyHtml += inputFieldWithToggle('bm-neck', 'Neck', { type: 'number', step: '0.1', inputmode: 'decimal', value: currentValues.neck }, units.neck, 'neck');
        
        bodyHtml += inputFieldWithToggle('bm-bodyfat', 'Body Fat', { type: 'number', step: '0.1', inputmode: 'decimal', value: currentValues.bodyfat }, units.bodyfat, 'bodyfat');
        bodyHtml += inputFieldWithoutToggle('bm-masculine', 'Masculine Number', { type: 'number', step: '0.1', inputmode: 'decimal', value: currentValues.masculine });
        
        bodyHtml += '</div>';

        bodyHtml += '<div class="mt-2 pt-2 border-t border-outline-variant/15">';
        if (units.height === 'ft/in') {
          var heightToggleBtn = '<button type="button" data-toggle-unit="height" class="bg-primary/20 text-primary border border-primary/30 px-2 py-0.5 rounded text-[10px] font-extrabold uppercase font-mono active:scale-95 transition-all select-none">ft/in</button>';
          bodyHtml += 
            '<div class="flex items-center justify-between mb-2">' +
            '  <span class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest text-[9px]">Height</span>' +
            '  ' + heightToggleBtn +
            '</div>' +
            '<div class="grid grid-cols-2 gap-3">' +
            '  <label class="block mb-2"><span class="block text-[11px] text-on-surface-variant mb-1 font-semibold">Feet</span>' +
            '    <input id="bm-height-ft" type="number" step="1" inputmode="numeric" value="' + esc(currentValues.height_ft) + '" class="w-full bg-surface-container-lowest border border-outline-variant/40 rounded-lg px-3 py-2 text-body-md text-on-surface outline-none min-h-[40px]">' +
            '  </label>' +
            '  <label class="block mb-2"><span class="block text-[11px] text-on-surface-variant mb-1 font-semibold">Inches</span>' +
            '    <input id="bm-height-in" type="number" step="0.1" inputmode="decimal" value="' + esc(currentValues.height_in) + '" class="w-full bg-surface-container-lowest border border-outline-variant/40 rounded-lg px-3 py-2 text-body-md text-on-surface outline-none min-h-[40px]">' +
            '  </label>' +
            '</div>';
        } else {
          var heightToggleBtn = '<button type="button" data-toggle-unit="height" class="bg-primary/20 text-primary border border-primary/30 px-2 py-0.5 rounded text-[10px] font-extrabold uppercase font-mono active:scale-95 transition-all select-none">cm</button>';
          bodyHtml += 
            '<div class="flex items-center justify-between mb-1.5">' +
            '  <span class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest text-[9px]">Height</span>' +
            '  ' + heightToggleBtn +
            '</div>' +
            '<input id="bm-height" type="number" step="0.1" inputmode="decimal" value="' + esc(currentValues.height_cm) + '" placeholder="e.g. 175" class="w-full bg-surface-container-lowest border border-outline-variant/40 rounded-lg px-3.5 py-3 text-body-lg text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none min-h-[48px] mb-2">';
        }
        bodyHtml += '</div>';

        bodyHtml += '<p class="text-[11px] text-on-surface-variant mt-2">Fill any — empty fields are skipped. Height powers your BMI.</p>';

        openSheet('Body measurements', bodyHtml, primaryBtn('bm-save', 'SAVE MEASUREMENTS', 'straighten'));

        document.querySelectorAll('[data-toggle-unit]').forEach(function(btn) {
          btn.addEventListener('click', function() {
            var f = btn.getAttribute('data-toggle-unit');
            saveCurrentInputs();

            if (f === 'bodyfat') {
              var next = units.bodyfat === '%' ? 'kg' : '%';
              units.bodyfat = next;
              setFieldUnit('bodyfat', next);
              var val = parseFloat(currentValues.bodyfat);
              if (!isNaN(val)) {
                if (next === 'kg' && weightVal) {
                  currentValues.bodyfat = ((val * weightVal) / 100).toFixed(1);
                } else if (next === '%' && weightVal) {
                  currentValues.bodyfat = ((val / weightVal) * 100).toFixed(1);
                }
              }
            } else if (f === 'height') {
              var next = units.height === 'cm' ? 'ft/in' : 'cm';
              units.height = next;
              setFieldUnit('height', next);
              if (next === 'ft/in') {
                var cm = parseFloat(currentValues.height_cm);
                if (!isNaN(cm)) {
                  var totalInches = cm / 2.54;
                  currentValues.height_ft = String(Math.floor(totalInches / 12));
                  currentValues.height_in = String(Math.round((totalInches % 12) * 10) / 10);
                }
              } else {
                var ft = parseFloat(currentValues.height_ft) || 0;
                var inch = parseFloat(currentValues.height_in) || 0;
                if (ft || inch) {
                  currentValues.height_cm = String(Math.round(((ft * 12) + inch) * 2.54 * 10) / 10);
                }
              }
            } else {
              var curr = units[f];
              var next = curr === 'cm' ? 'in' : 'cm';
              units[f] = next;
              setFieldUnit(f, next);
              var val = parseFloat(currentValues[f]);
              if (!isNaN(val)) {
                if (next === 'in') {
                  currentValues[f] = (val / 2.54).toFixed(1);
                } else {
                  currentValues[f] = (val * 2.54).toFixed(1);
                }
              }
            }
            drawForm();
          });
        });

        document.getElementById('bm-save').addEventListener('click', function () {
          saveCurrentInputs();

          var gVal = function (val) {
            if (val === '' || val === undefined || val === null) return null;
            var numVal = Number(val);
            if (isNaN(numVal)) return null;
            return numVal;
          };

          var rawChest = gVal(currentValues.chest),
              rawShoulders = gVal(currentValues.shoulders),
              rawWaist = gVal(currentValues.waist),
              rawHips = gVal(currentValues.hips),
              rawBiceps = gVal(currentValues.arms),
              rawForearms = gVal(currentValues.forearms),
              rawEyes = gVal(currentValues.eyes),
              rawThigh = gVal(currentValues.thighs),
              rawCalves = gVal(currentValues.calves),
              rawNeck = gVal(currentValues.neck),
              rawBodyfat = gVal(currentValues.bodyfat),
              rawMasculine = gVal(currentValues.masculine);

          var toCm = function(val, field) {
            if (val === null) return null;
            return units[field] === 'in' ? val * 2.54 : val;
          };

          var synced = {
            chest_cm: toCm(rawChest, 'chest'),
            waist_cm: toCm(rawWaist, 'waist'),
            hips_cm: toCm(rawHips, 'hips'),
            biceps_cm: toCm(rawBiceps, 'arms'),
            thigh_cm: toCm(rawThigh, 'thighs')
          };

          var shoulders = toCm(rawShoulders, 'shoulders');
          var forearms = toCm(rawForearms, 'forearms');
          var eyes = toCm(rawEyes, 'eyes');
          var calves = toCm(rawCalves, 'calves');
          var neck = toCm(rawNeck, 'neck');

          var bodyfat = rawBodyfat;
          if (bodyfat !== null && units.bodyfat === 'kg') {
            if (!weightVal) {
              window.toast('Please log your weight on Home first to log body fat in kg', 'warning');
              return;
            }
            bodyfat = (bodyfat / weightVal) * 100;
          }

          var height = null;
          if (units.height === 'ft/in') {
            var ftVal = Number(currentValues.height_ft), inVal = Number(currentValues.height_in);
            if (ftVal || inVal) {
              height = ((ftVal || 0) * 12 + (inVal || 0)) * 2.54;
            }
          } else {
            height = gVal(currentValues.height_cm);
          }

          if (height !== null) setHeight(height);

          var anyLocal = shoulders !== null || bodyfat !== null || forearms !== null || eyes !== null || calves !== null || neck !== null || rawMasculine !== null;
          if (anyLocal) {
            saveBodyExtra(todayStr(), {
              shoulders_cm: shoulders,
              body_fat_pct: bodyfat,
              forearms_cm: forearms,
              eyes_cm: eyes,
              calves_cm: calves,
              neck_cm: neck,
              masculine_number: rawMasculine
            });
          }

          var anySynced = Object.keys(synced).some(function (k) { return synced[k] !== null; });
          if (!anySynced && !anyLocal && height === null) {
            window.toast('Enter at least one value', 'warning');
            return;
          }

          var done = function () {
            closeSheet();
            window.toast('Measurements saved', 'success');
            if (S.view === 'progress') route();
          };

          if (anySynced) {
            repos().measurements.add(synced).then(function (r) {
              if (r && r.error) { window.toast(r.error, 'error'); return; }
              done();
            });
          } else {
            done();
          }
        });
      }

      function saveCurrentInputs() {
        var gIdVal = function(id) {
          var el = document.getElementById(id);
          return el ? el.value.trim() : '';
        };
        currentValues.chest = gIdVal('bm-chest');
        currentValues.shoulders = gIdVal('bm-shoulders');
        currentValues.waist = gIdVal('bm-waist');
        currentValues.hips = gIdVal('bm-hips');
        currentValues.arms = gIdVal('bm-biceps');
        currentValues.forearms = gIdVal('bm-forearms');
        currentValues.eyes = gIdVal('bm-eyes');
        currentValues.thighs = gIdVal('bm-thigh');
        currentValues.calves = gIdVal('bm-calves');
        currentValues.neck = gIdVal('bm-neck');
        currentValues.bodyfat = gIdVal('bm-bodyfat');
        currentValues.masculine = gIdVal('bm-masculine');
        
        if (units.height === 'ft/in') {
          currentValues.height_ft = gIdVal('bm-height-ft');
          currentValues.height_in = gIdVal('bm-height-in');
        } else {
          currentValues.height_cm = gIdVal('bm-height');
        }
      }

      drawForm();
    });
  }

  function viewProfile(el) {
    el.innerHTML = '<div class="pt-3 pb-3 text-headline-sm text-headline-sm text-on-surface">Profile</div>' + skel(4) + skel(3);
    Promise.all([
      repos() ? repos().profile() : null,
      repos() ? repos().goals.list() : [],

  function fillStorage(id) {
    if (navigator.storage && navigator.storage.estimate) {
      navigator.storage.estimate().then(function (est) {
        var elx = document.getElementById(id);
        if (!elx) return;
        var used = (est.usage || 0) / 1048576;
        elx.textContent = used < 1 ? '< 1 MB used' : used.toFixed(1) + ' MB used';
      }).catch(function () {});
    } else {
      var elx = document.getElementById(id);
      if (elx) elx.textContent = '—';
    }
  }

  // ── Goals with types + progress (Section 3) ─────────────────────────────
  var GOAL_TYPES = [
    { id: 'lose_weight', label: 'Lose Weight', icon: 'trending_down', weight: true },
    { id: 'gain_muscle', label: 'Gain Muscle', icon: 'fitness_center', weight: true },
    { id: 'maintain', label: 'Maintain', icon: 'balance', weight: true },
    { id: 'strength', label: 'Strength', icon: 'exercise', weight: false },
    { id: 'recomp', label: 'Recomp', icon: 'change_circle', weight: false },
    { id: 'custom', label: 'Custom', icon: 'flag', weight: false }
  ];
  function goalTypeById(id) { for (var i = 0; i < GOAL_TYPES.length; i++) if (GOAL_TYPES[i].id === id) return GOAL_TYPES[i]; return null; }
  // target_value doubles as a compact JSON blob {t,tv,u,s} (syncs as a string);
  // legacy plain-text goals return null and render as before.
  function parseGoal(g) {
    if (!g || !g.target_value || typeof g.target_value !== 'string' || g.target_value.charAt(0) !== '{') return null;
    try { var o = JSON.parse(g.target_value); return (o && typeof o === 'object') ? o : null; } catch (e) { return null; }
  }
  function goalProgress(meta, current) {
    if (!meta || meta.tv == null || current == null) return null;
    var t = goalTypeById(meta.t);
    if (!t || !t.weight) return null;
    var s = num(meta.s) || num(current), tv = num(meta.tv), cur = num(current), pct = 0, remain = '';
    if (meta.t === 'lose_weight') { pct = (s - cur) / ((s - tv) || 1); remain = cur > tv ? (Math.round((cur - tv) * 10) / 10 + ' kg to go') : 'Reached! 🎉'; }
    else if (meta.t === 'gain_muscle') { pct = (cur - s) / ((tv - s) || 1); remain = cur < tv ? (Math.round((tv - cur) * 10) / 10 + ' kg to go') : 'Reached! 🎉'; }
    else { var diff = Math.abs(cur - tv); pct = 1 - Math.min(1, diff / 2); remain = diff <= 1 ? 'On target' : (Math.round(diff * 10) / 10 + ' kg off'); }
    return { pct: Math.max(0, Math.min(100, Math.round(pct * 100))), remain: remain, current: cur, target: tv, unit: meta.u || 'kg' };
  }
  function goalTargetField(typeId) {
    var t = goalTypeById(typeId);
    if (t && t.weight) return inputField('g-target', 'Target weight (kg)', { type: 'number', step: '0.1', inputmode: 'decimal', placeholder: 'e.g. 75' });
    return inputField('g-target', 'Target (optional)', { placeholder: 'e.g. Bench 100 kg' });
  }

        }).join('') + '</div>' +

        '<div id="g-target-wrap">' + goalTargetField(sel) + '</div>',
        primaryBtn('g-save', 'ADD GOAL', 'flag'));
      var typesBox = document.getElementById('g-types');
      typesBox.querySelectorAll('[data-gt]').forEach(function (b) {
        b.addEventListener('click', function () {
          sel = b.getAttribute('data-gt');
          typesBox.querySelectorAll('[data-gt]').forEach(function (x) {

            x.querySelector('.material-symbols-outlined').className = 'material-symbols-outlined text-[20px] ' + (on ? 'text-primary' : 'text-on-surface-variant');

        var title = document.getElementById('g-title').value.trim();

        var raw = (document.getElementById('g-target') || {}).value;
        var meta = { t: sel };
        if (t && t.weight) { var tv = Number(raw); if (tv) meta.tv = tv; meta.u = 'kg'; if (latestWeight != null) meta.s = latestWeight; }

          if (r && r.error) { window.toast(r.error, 'error'); return; }
          closeSheet(); window.toast('Goal added', 'success');
          if (S.view === 'profile') route();
        });
      });
    });
  }

      } else if (b.type === 'stats') {
        h += '<div class="grid grid-cols-' + Math.min(3, (b.items || []).length || 1) + ' gap-2 mb-4">' + (b.items || []).map(function (s) {
          return '<div class="mbr-card p-3 text-center"><div class="text-title-md text-on-surface font-bold leading-none">' + esc(String(s.value)) + '</div><div class="text-[10px] text-on-surface-variant uppercase tracking-wider mt-1">' + esc(s.label) + '</div></div>';
        }).join('') + '</div>';
      } else if (b.type === 'score') {
        var pct = Math.round((b.value / (b.max || 100)) * 100);
        h += '<div class="mbr-card p-4 mb-4 text-center"><div class="text-headline-md text-on-surface font-bold">' + b.value + '<span class="text-body-md text-on-surface-variant">/' + (b.max || 100) + '</span></div>' +
          '<div class="text-body-md text-primary font-semibold mt-0.5">' + esc(b.label) + '</div>' +
          '<div class="w-full h-2 bg-surface-container-highest rounded-full overflow-hidden mt-3"><div class="h-full bg-primary rounded-full" style="width:' + pct + '%"></div></div>' +
          (b.confidence ? '<div class="text-[11px] text-on-surface-variant mt-2">Confidence: ' + esc(b.confidence) + '</div>' : '') + '</div>';
      }
    });
    if (r.disclaimer) h += '<div class="flex gap-2 bg-tertiary/10 border border-tertiary/25 rounded-lg px-3 py-2.5 mb-2"><span class="material-symbols-outlined text-tertiary text-[18px] shrink-0">info</span><div class="text-body-sm text-on-surface">' + esc(r.disclaimer) + '</div></div>';
    h += '<div class="flex items-center gap-1.5 justify-center text-[11px] text-on-surface-variant/70 mt-1"><span class="material-symbols-outlined text-[14px]">bolt</span>Generated on-device · private</div>';
    return h;
  }
  // Runs an AI service call in a sheet with loading + cancel.
  function sheetAI(title, factory) {
    if (!aiOn()) { window.toast('AI is turned off — enable it in Settings.', 'info'); return; }
    openModal(esc(title),
      '<div id="ai-body" class="min-h-[130px] flex flex-col items-center justify-center py-6 text-center">' +
      '<div class="w-9 h-9 rounded-full border-2 border-primary/30 border-t-primary animate-spin mb-3"></div>' +
      '<div class="text-body-sm text-on-surface-variant">Thinking…</div>' +
      '<button id="ai-cancel" class="mt-4 text-body-sm text-on-surface-variant underline">Cancel</button></div>');
    var p = factory(), cancelled = false;
    var cb = document.getElementById('ai-cancel');
    if (cb) cb.addEventListener('click', function () { cancelled = true; if (p && p.cancel) p.cancel(); closeSheet(); });
    p.then(function (res) {
      if (cancelled) return;
      var body = document.getElementById('ai-body');
      if (body) { body.className = 'mbr-view'; body.innerHTML = renderAIResult(res); }
    }).catch(function (e) {
      if (cancelled || (e && e.cancelled)) return;
      var body = document.getElementById('ai-body');
      if (body) { body.className = ''; body.innerHTML = emptyState('error', 'Couldn\'t generate that', 'Please try again.'); }
    });
  }

  // ── AI Coach (screen-aware) ─────────────────────────────
  function aiModelPill() {
    if (window.GymAI && window.GymAI.usingRealModel()) return '<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full bg-secondary/15 text-secondary text-[10px] font-bold uppercase tracking-wider"><span class="w-1.5 h-1.5 rounded-full bg-secondary"></span>Gemma</span>';
    var st = window.GymMemberLLM ? window.GymMemberLLM.status() : 'unsupported';
    if (st === 'loading') return '<span class="text-[10px] text-primary">Loading Gemma…</span>';
    if (window.GymMemberLLM && window.GymMemberLLM.supported()) return '<button id="ai-pill-dl" class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full bg-primary/10 border border-primary/30 text-[10px] font-semibold text-primary"><span class="material-symbols-outlined text-[12px]">download</span>Enable Gemma</button>';
    return '<span class="px-2 py-0.5 rounded-full bg-surface-container-highest border border-outline-variant/30 text-[10px] font-semibold text-on-surface-variant">Quick mode</span>';
  }
  function llmDownload(onDone) {
    if (!window.GymMemberLLM) { window.toast('On-device model isn\'t available here.', 'info'); return; }
    if (!window.GymMemberLLM.supported()) { window.toast('The on-device Gemma model runs inside the Gym Flow app — open it there to enable full AI.', 'info'); return; }
    window.toast('Downloading Gemma — one-time, then it runs fully on your device.', 'info');
    window.GymMemberLLM.load().then(function () { window.toast('Gemma ready — running natively on your device 🎉', 'success'); if (onDone) onDone(); }).catch(function (e) { window.toast((e && e.message) || 'Model download failed.', 'error'); });
  }

  // Native in-app chat (Gym Flow design tokens — not a web-wrapper).
  function coachSheet() {
    if (!aiOn()) { window.toast('AI is turned off — enable it in Settings.', 'info'); return; }
    var screen = S.view;
    var chips = ['Analyze My Week', 'Analyze My Month', 'Pattern Check', 'Analyze My Prompt'];
    openSheet('AI Coach',
      '<div class="flex items-center justify-between mb-2.5"><span class="text-body-sm text-on-surface-variant">Private on-device coach · ' + esc(S.view) + '</span>' + aiModelPill() + '</div>' +
      '<div id="ai-chat-msgs" class="space-y-3 mb-3 max-h-[46vh] overflow-y-auto pr-0.5"></div>' +
      '<div class="flex flex-wrap gap-1.5 mb-2.5" id="ai-chips">' + chips.map(function (c) { return '<button data-chip="' + esc(c) + '" class="px-2.5 py-1.5 rounded-full bg-surface-container-low border border-outline-variant/30 text-[12px] text-on-surface-variant active:scale-95 transition-transform">' + esc(c) + '</button>'; }).join('') + '</div>' +
      '<div class="flex gap-2"><input id="ai-chat-in" type="text" autocomplete="off" placeholder="Ask your coach…" class="flex-1 bg-surface-container-lowest border border-outline-variant/40 rounded-lg px-3.5 py-3 text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none min-h-[46px]"><button id="ai-chat-send" aria-label="Send" class="w-12 shrink-0 bg-primary text-on-primary rounded-lg flex items-center justify-center"><span class="material-symbols-outlined text-[20px]">send</span></button></div>');
    var msgs = document.getElementById('ai-chat-msgs');
    function bubble(role, html) {
      var wrap = document.createElement('div');
      wrap.className = role === 'user' ? 'flex justify-end' : 'flex justify-start';
      wrap.innerHTML = '<div class="' + (role === 'user' ? 'bg-primary text-on-primary' : 'bg-surface-container-low border border-outline-variant/25 text-on-surface') + ' rounded-2xl px-3.5 py-2.5 max-w-[86%] text-body-md">' + html + '</div>';
      msgs.appendChild(wrap); msgs.scrollTop = msgs.scrollHeight;
      return wrap.firstChild;
    }
    bubble('assistant', 'Hi! Ask me about your training, nutrition, recovery or goals — everything stays on your device.' + (window.GymAI.usingRealModel() ? '' : ' <span class="text-on-surface-variant text-body-sm">(Enable Gemma above for full conversational answers.)</span>'));
    function send(q, forced) {
      if (!q) return;
      bubble('user', esc(q));
      var node = bubble('assistant', '<span class="inline-flex items-center gap-1.5 text-on-surface-variant"><span class="w-4 h-4 rounded-full border-2 border-primary/30 border-t-primary animate-spin"></span>Thinking…</span>');
      var inp = document.getElementById('ai-chat-in'); if (inp && !forced) inp.value = '';
      var p = forced ? forced() : window.GymAI.service.chat(q, screen, { onToken: function (delta, full) { node.textContent = full; msgs.scrollTop = msgs.scrollHeight; } });
      p.then(function (res) {
        if (res && res.text !== undefined) node.textContent = res.text || '…';
        else node.innerHTML = renderAIResult(res);
        msgs.scrollTop = msgs.scrollHeight;
      }).catch(function (e) { node.textContent = (e && e.disabled) ? 'AI is turned off.' : 'Sorry — I couldn\'t answer that. Try again.'; });
    }
    document.getElementById('ai-chat-send').addEventListener('click', function () { send(document.getElementById('ai-chat-in').value.trim()); });
    document.getElementById('ai-chat-in').addEventListener('keydown', function (e) { if (e.key === 'Enter') send(e.target.value.trim()); });
    document.querySelectorAll('#ai-chips [data-chip]').forEach(function (b) {
      b.addEventListener('click', function () {
        var c = b.getAttribute('data-chip');
        if (c === 'Analyze My Prompt') { var i = document.getElementById('ai-chat-in'); if (i) i.focus(); return; }
        var map = { 'Analyze My Week': ['Analyse my week', function () { return window.GymAI.service.analyzeWeek(); }], 'Analyze My Month': ['Analyse my month', function () { return window.GymAI.service.analyzeMonth(); }], 'Pattern Check': ['Pattern check', function () { return window.GymAI.service.detectPatterns(); }] };
        var m = map[c]; if (m) send(m[0], m[1]);
      });
    });
    var pill = document.getElementById('ai-pill-dl');
    if (pill) pill.addEventListener('click', function () { llmDownload(); window.toast('You can keep chatting — quick mode until Gemma finishes.', 'info'); });
  }
  function syncAIFab() {
    var f = document.getElementById('ai-fab');
    if (!f) return;
    f.style.display = aiOn() ? 'flex' : 'none';
  }
  function aiFabInit() {
    if (document.getElementById('ai-fab')) { syncAIFab(); return; }
    var fab = document.createElement('button');
    fab.id = 'ai-fab';
    fab.setAttribute('aria-label', 'AI Coach');
    fab.className = 'fixed z-40 right-4 flex items-center justify-center w-14 h-14 rounded-2xl bg-primary text-on-primary shadow-panel active:scale-95 transition-transform';
    fab.style.bottom = 'calc(76px + env(safe-area-inset-bottom, 0px))';
    fab.innerHTML = '<span class="material-symbols-outlined text-[26px]">auto_awesome</span>';
    document.body.appendChild(fab);
    fab.addEventListener('click', coachSheet);
    syncAIFab();
  }

  // ── AI Insights screen ──────────────────────────────────
  function aiActionCard(key, icon, label) {
    return '<button data-ai-act="' + key + '" class="mbr-card p-4 text-left active:scale-[0.98] transition-transform"><span class="w-9 h-9 rounded-lg bg-primary/10 border border-primary/25 flex items-center justify-center mb-2"><span class="material-symbols-outlined text-[20px] text-primary">' + icon + '</span></span><div class="text-body-md font-semibold text-on-surface">' + label + '</div></button>';
  }
  function aiRunAction(key) {
    var map = {
      week: ['This week', function () { return window.GymAI.service.analyzeWeek(); }],
      month: ['This month', function () { return window.GymAI.service.analyzeMonth(); }],
      recovery: ['Recovery', function () { return window.GymAI.service.recovery(); }],
      patterns: ['Pattern check', function () { return window.GymAI.service.detectPatterns(); }]
    };
    var a = map[key]; if (a) sheetAI(a[0], a[1]);
  }
  function viewInsights(el) {
    var back = '<div class="pt-3 pb-3 flex items-center gap-2"><a href="#/home" aria-label="Back" class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-surface-container text-on-surface-variant"><span class="material-symbols-outlined text-[20px]">arrow_back</span></a><div class="text-headline-sm text-headline-sm text-on-surface">AI Insights</div></div>';
    if (!aiOn()) { el.innerHTML = back + emptyState('toggle_off', 'AI is off', 'Enable AI in Settings to see your insights.'); return; }
    el.innerHTML = back + '<div id="ai-ins-top" class="mb-4">' + skel(3) + '</div>' +
      '<div class="grid grid-cols-2 gap-2.5">' +
      aiActionCard('week', 'analytics', 'Analyse my week') + aiActionCard('month', 'calendar_month', 'Analyse my month') +
      aiActionCard('recovery', 'bolt', 'Recovery') + aiActionCard('patterns', 'pattern', 'Pattern check') + '</div>';
    refreshAIMemory().then(function () { return window.GymAI.service.insights(); }).then(function (res) {
      if (S.view !== 'insights') return;
      var t = document.getElementById('ai-ins-top');
      if (t) { t.className = 'mbr-card p-4 mb-4'; t.innerHTML = '<div class="flex items-center gap-2 mb-2"><span class="material-symbols-outlined text-primary text-[20px]">auto_awesome</span><span class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest">Overview</span></div>' + renderAIResult(res); }
    }).catch(function () {});
    el.querySelectorAll('[data-ai-act]').forEach(function (b) { b.addEventListener('click', function () { aiRunAction(b.getAttribute('data-ai-act')); }); });
  }
  // Home AI summary card (synchronous, from memory).
  function aiHomeCardHtml() {
    if (!aiOn() || !window.GymAI || !window.GymAI.memory.has()) return '';
    var r = window.GymAI.service.todaySummarySync(); if (!r) return '';
    var items = (r.blocks[0] && r.blocks[0].items) || [];
    return '<div class="mbr-card p-4 mb-2.5 border-primary/25">' +
      '<div class="flex items-center gap-2 mb-2.5"><span class="material-symbols-outlined text-primary text-[20px]">auto_awesome</span><span class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest text-[10px]">AI · Today\'s summary</span></div>' +
      items.slice(0, 4).map(function (it) { return '<div class="flex items-center gap-2 py-0.5"><span class="material-symbols-outlined text-[16px] ' + aiIconTone(it.tone) + '">' + (it.icon || 'chevron_right') + '</span><span class="text-body-sm text-on-surface">' + esc(it.text) + '</span></div>'; }).join('') +
      '<button id="ai-home-explain" class="mt-3 w-full bg-primary/10 border border-primary/30 text-primary py-2 rounded-lg text-[12px] font-semibold flex items-center justify-center gap-1.5 min-h-[36px]"><span class="material-symbols-outlined text-[16px]">tips_and_updates</span>Explain</button>' +
      '</div>';
  }

  // ── Boot ────────────────────────────────────────────────
  function boot() {
    // shared.css reserves bottom-nav space via body padding; designSystem marks
    // pages without the ADMIN nav marker as no-bottom-nav — undo that here since
    // the member shell brings its own bottom navigation.
    document.body.classList.remove('no-bottom-nav');
    restoreActive();

    var bell = document.getElementById('hdr-bell');
    if (bell) bell.addEventListener('click', sheetNotifications);

    window.api.fetch('/auth/session').then(function (r) {
      if (r.status === 401 || r.status === 403) { window.location.href = '/login'; return null; }
      return r.json();
    }).then(function (data) {
      if (!data) return;
      S.session = data;
      S.roles = data.roles || [];
      S.email = (data.user && data.user.email) || '';
      var g = document.getElementById('hdr-gym');
      if (g && data.tenant && data.tenant.gym_name) g.textContent = data.tenant.gym_name;

      // Real background sync only when a genuine Health Connect link already
      // exists. No auto-nag modal, no simulated data.
      if (Wearables.isHealthLinked()) {
        Wearables.syncData().catch(function () {});
      }
    }).catch(function () { /* offline cold start — cached shell + local data */ });

    if (window.GymNet) { window.GymNet.on(onNetState); onNetState(window.GymNet.getState()); }
    window.addEventListener('gymflow-theme-changed', function () {
      if (S.view === 'progress') route(); // charts re-read CSS variables
    });
    window.addEventListener('hashchange', route);
    route();
    refreshNotifications();
    aiFabInit();
    Wearables.init();
    refreshAIMemory().then(function () { refreshNotifications(); if (window.GymMemberLLM) window.GymMemberLLM.init(); if (S.view === 'home') route(); });
    window.addEventListener('pagehide', function () { if (window.GymMemberLLM) window.GymMemberLLM.release(); if (window.GymAI) window.GymAI.runtime.unload(); });
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
  else boot();
})();
</script>

</body></html>
