<!DOCTYPE html><html class="dark" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<link href="/assets/css/shared.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="/assets/js/designSystem.js"></script>
<script src="/assets/js/api.js"></script>
<script src="/assets/js/utils.js"></script>
<title>Gym Flow - Tasks</title>

<style>
        .glass-panel {
            background-color: rgba(27, 27, 27, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .active-indicator {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 2px;
            background-color: var(--color-primary, #b5c4ff);
        }
        /* Custom scrollbar for dark theme */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #353534; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #434655; }
        main, aside {
            transition: all 0.3s ease-in-out;
        }
        @media (min-width: 768px) {
            body.sidebar-collapsed main {
                margin-left: 0 !important;
                width: 100% !important;
            }
            body.sidebar-collapsed header {
                left: 0 !important;
                width: 100% !important;
            }
            body.sidebar-collapsed aside {
                transform: translateX(-280px);
            }
        }
    </style>

</head>
<body class="font-body text-body-md antialiased min-h-screen md:pl-[280px] pt-16 transition-all duration-300 bg-background text-on-background antialiased flex transition-all duration-300">
<div id="jsb-header" data-page-title="Tasks"></div>
<div id="jsb-sidebar"></div>

<!-- TopAppBar -->

<!-- NavigationDrawer (Desktop) -->


<!-- Main Content Area -->
<main class="flex-1 h-full overflow-y-auto relative bg-background pb-24 md:pb-0">
<!-- Page Content -->
<div class="pt-20 md:pt-28 px-4 md:px-margin max-w-container-max mx-auto pb-stack-lg">
<!-- Page Header -->
<div class="mb-stack-lg flex flex-col md:flex-row md:items-end justify-between gap-4">
<div>
<h2 class="font-display-lg text-display-lg break-words min-w-0 text-on-surface mb-2">Command Center</h2>
<p class="font-body-lg text-body-lg text-on-surface-variant">Today's priority tasks and operational alerts.</p>
</div>
<div class="flex gap-3">
<button class="px-4 py-2 rounded-lg bg-surface-container-high border border-outline/20 text-on-surface hover:border-primary/50 hover:text-primary transition-all flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">filter_list</span>
<span>Filter</span>
</button>
<button class="px-4 py-2 rounded-lg bg-primary-container text-on-primary-container font-medium hover:bg-primary hover:text-on-primary transition-all flex items-center gap-2 active:scale-95 shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-[18px]">add_task</span>
<span>New Task</span>
</button>
</div>
</div>
<!-- Bento Grid Layout -->
<div class="grid grid-cols-1 md:grid-cols-12 gap-gutter">
<!-- High Priority Column (Spans 8 columns on desktop) -->
<div class="md:col-span-8 flex flex-col gap-stack-md">
<!-- Critical Alerts Banner -->
<div id="critical-alert" class="glass-panel rounded-xl p-6 border-l-4 border-l-error relative overflow-hidden">
<div class="absolute -right-10 -top-10 opacity-10 pointer-events-none">
<span id="alert-icon-bg" class="material-symbols-outlined text-[120px] text-error">warning</span>
</div>
<div class="flex items-start gap-4">
<div id="alert-icon" class="p-3 bg-error/10 rounded-full text-error shrink-0">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">error</span>
</div>
<div>
<h3 id="alert-title" class="font-title-lg text-title-lg text-error mb-1">Checking payments…</h3>
<p id="alert-desc" class="font-body-md text-body-md text-on-surface-variant mb-4">Loading collection status.</p>
<button id="review-collections-btn" class="text-sm font-medium text-error hover:text-error-container underline decoration-error/30 underline-offset-4 transition-colors">
                                    Review Collections →
                                </button>
</div>
</div>
</div>
<!-- Today's Tasks Box -->
<div class="glass-panel rounded-xl flex flex-col h-full">
<div class="p-6 border-b border-white/5 flex justify-between items-center">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">checklist</span>
<h3 class="font-title-lg text-title-lg text-on-surface">Today's Agenda</h3>
</div>
<span id="pending-count" class="bg-surface-variant text-on-surface-variant px-3 py-1 rounded-full text-xs font-medium">0 Pending</span>
</div>
<div id="agenda-list" class="p-4 space-y-3">
<p id="agenda-loading" class="text-center text-sm text-on-surface-variant py-8">Loading tasks…</p>
</div>
<div class="p-4 border-t border-white/5 text-center mt-auto">
<button class="text-sm font-medium text-on-surface-variant hover:text-primary transition-colors w-full py-2" onclick="window.location.href='/tasks'">View All 12 Tasks</button>
</div>
</div>
</div>
<!-- Secondary Column (Spans 4 columns on desktop) -->
<div class="md:col-span-4 flex flex-col gap-stack-md">
<!-- Renewals Glass Card -->
<div class="glass-panel rounded-xl p-6">
<div class="flex items-center justify-between mb-6">
<h3 class="font-title-lg text-title-lg text-on-surface flex items-center gap-2">
<span class="material-symbols-outlined text-secondary">autorenew</span>
                                Pending Renewals
                            </h3>
<button class="text-on-surface-variant hover:text-on-surface"><span class="material-symbols-outlined">more_horiz</span></button>
</div>
<div id="renewals-list" class="space-y-4">
<p id="renewals-loading" class="text-center text-xs text-on-surface-variant py-4">Loading renewals…</p>
</div>
<button class="w-full mt-6 py-2 rounded-lg border border-outline/20 text-sm font-medium text-on-surface hover:bg-surface-variant transition-colors">
                            Manage All Renewals
                        </button>
</div>
<!-- Absent Members (Follow-ups) -->
<div class="glass-panel rounded-xl p-6 flex-1 min-h-[200px] flex flex-col">
<div class="flex items-center justify-between mb-4">
<h3 class="font-title-lg text-title-lg text-on-surface flex items-center gap-2">
<span class="material-symbols-outlined text-error">person_off</span>
                                Absent Members
                            </h3>
<span id="absent-count" class="bg-surface-variant text-on-surface-variant px-3 py-1 rounded-full text-xs font-medium">0</span>
</div>
<div id="absent-list" class="space-y-3 flex-1">
<p id="absent-loading" class="text-center text-xs text-on-surface-variant py-4">Loading…</p>
</div>
<button id="view-retention-btn" class="w-full mt-4 py-2 rounded-lg border border-outline/20 text-sm font-medium text-on-surface hover:bg-surface-variant transition-colors">
                            View Retention Dashboard
                        </button>
</div>
</div>
</div>
</div>
</main>
<!-- BottomNavBar (Mobile Only) -->

<div id="jsb-mobile-nav"></div>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

  // ---- Real Tasks (replaces all demo content) ----
  try {
    const res = await window.api.fetch('/tasks');
    if (!res.ok) throw new Error('Failed to fetch tasks');
    const tasks = await res.json();
    const list = document.getElementById('agenda-list');
    const pending = (Array.isArray(tasks) ? tasks : []).filter(t => t.status !== 'Completed');
    const badge = document.getElementById('pending-count');
    if (badge) badge.innerText = `${pending.length} Pending`;
    const viewAll = Array.from(document.querySelectorAll('button')).find(b => /View All .* Tasks/.test(b.textContent));
    if (viewAll) viewAll.textContent = `View All ${(Array.isArray(tasks)?tasks:[]).length} Tasks`;

    if (!pending.length) {
      list.innerHTML = `
        <div class="py-16 flex flex-col items-center justify-center text-center max-w-md mx-auto">
          <div class="w-16 h-16 rounded-2xl bg-surface-container border border-outline-variant/30 flex items-center justify-center mb-6 shadow-sm">
            <span class="material-symbols-outlined text-primary text-[32px]">task_alt</span>
          </div>
          <h3 class="font-title-lg text-title-lg text-on-surface font-semibold mb-2">No active tasks</h3>
          <p class="text-on-surface-variant text-sm mb-6 max-w-xs">Create tasks to assign to your gym staff or schedule operations.</p>
          <button onclick="Array.from(document.querySelectorAll('button')).find(b => /New Task/.test(b.textContent)).click()" class="bg-primary text-on-primary font-label-md px-6 py-2.5 rounded-lg hover:opacity-90 transition-opacity flex items-center gap-2">
            <span class="material-symbols-outlined text-[18px]">add_task</span> Create Task
          </button>
        </div>
      `;
    } else {
      list.innerHTML = pending.map(t => {
        const pri = t.priority || 'Medium';
        const priClass = (pri === 'Critical' || pri === 'High') ? 'bg-error/10 text-error border-error/20'
          : (pri === 'Low' ? 'bg-surface-variant text-on-surface-variant border-transparent' : 'bg-tertiary/10 text-tertiary border-tertiary/20');
        const due = t.due_date ? new Date(t.due_date) : null;
        const dueTxt = (due && !isNaN(due)) ? due.toLocaleDateString([], { month: 'short', day: 'numeric' }) : '';
        return `<div class="group flex items-start gap-4 p-4 rounded-lg bg-surface-container/50 hover:bg-surface-container-high border border-transparent hover:border-white/10 transition-all" data-id="${esc(t.id)}">
          <button class="task-done mt-1 w-5 h-5 rounded border-2 border-outline-variant hover:border-primary flex items-center justify-center transition-colors" title="Mark complete">
            <span class="material-symbols-outlined text-[14px] text-transparent group-hover:text-primary">check</span>
          </button>
          <div class="flex-1">
            <div class="flex justify-between items-start mb-1">
              <h4 class="font-body-lg text-body-lg font-medium text-on-surface">${esc(t.title)}</h4>
              <span class="text-xs px-2 py-1 rounded border ${priClass}">${esc(pri)}</span>
            </div>
            <p class="font-body-md text-body-md text-on-surface-variant line-clamp-1">${esc(t.detail || '')}</p>
            ${dueTxt ? `<p class="text-xs text-outline mt-2 flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">schedule</span> Due ${dueTxt}</p>` : ''}
          </div>
        </div>`;
      }).join('');
      list.querySelectorAll('.task-done').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const id = e.currentTarget.closest('[data-id]').getAttribute('data-id');
          try {
            await window.api.fetch(`/tasks/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ status: 'Completed' }) });
            location.reload();
          } catch (err) { console.error(err); }
        });
      });
    }
  } catch (err) {
    console.error('Failed to load tasks', err);
    const list = document.getElementById('agenda-list');
    if (list) list.innerHTML = `<p class="text-center text-sm text-on-surface-variant py-8">Could not load tasks.</p>`;
  }

  // ---- Real Pending Renewals (derived from live members; not plan-gated) ----
  try {
    const res = await window.api.fetch('/members');
    if (!res.ok) throw new Error('Failed to fetch renewals');
    const members = await res.json();
    const list = document.getElementById('renewals-list');
    const due = (Array.isArray(members) ? members : [])
      .filter(m => m.status === 'Expired' || (typeof m.daysLeft === 'number' && m.daysLeft >= 0 && m.daysLeft <= 7))
      .sort((a, b) => (a.daysLeft || 0) - (b.daysLeft || 0)).slice(0, 6);
    if (!due.length) {
      list.innerHTML = `<p class="text-center text-xs text-on-surface-variant py-4">No upcoming renewals.</p>`;
    } else {
      list.innerHTML = due.map(m => {
        const initials = (m.full_name || '?').split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
        const statusTxt = m.status === 'Expired' ? 'Expired' : (m.daysLeft === 0 ? 'Expires Today' : `Expires in ${m.daysLeft}d`);
        const statusCls = m.status === 'Expired' ? 'text-error' : 'text-tertiary';
        return `<div class="flex items-center justify-between cursor-pointer" onclick="window.location.href='/renew?member_id=${esc(m.id)}'">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-surface-variant flex items-center justify-center text-on-surface-variant border border-outline/20 font-medium">${esc(initials)}</div>
            <div><p class="font-body-md font-medium text-on-surface">${esc(m.full_name)}</p><p class="text-xs ${statusCls}">${esc(statusTxt)}</p></div>
          </div>
          <button class="w-8 h-8 rounded-full bg-surface-variant hover:bg-primary/20 hover:text-primary flex items-center justify-center transition-colors"><span class="material-symbols-outlined text-[18px]">autorenew</span></button>
        </div>`;
      }).join('');
    }
  } catch (err) {
    console.error('Failed to load renewals', err);
    const list = document.getElementById('renewals-list');
    if (list) list.innerHTML = `<p class="text-center text-xs text-on-surface-variant py-4">Could not load renewals.</p>`;
  }

  // ---- Critical Alert: live overdue/unpaid payments ----
  try {
    const res = await window.api.fetch('/dashboard/summary');
    if (!res.ok) throw new Error('Failed to fetch summary');
    const data = await res.json();
    const count = Number(data.pendingInvoices || 0);
    const title = document.getElementById('alert-title');
    const desc = document.getElementById('alert-desc');
    const panel = document.getElementById('critical-alert');
    const reviewBtn = document.getElementById('review-collections-btn');
    if (count > 0) {
      if (title) title.innerText = `${count} Overdue Payment${count === 1 ? '' : 's'}`;
      if (desc) desc.innerText = 'Members with unpaid invoices. Follow up to recover revenue.';
    } else {
      if (panel) panel.classList.replace('border-l-error', 'border-l-secondary');
      const iconBg = document.getElementById('alert-icon-bg');
      const icon = document.getElementById('alert-icon');
      if (iconBg) { iconBg.innerText = 'task_alt'; iconBg.classList.replace('text-error', 'text-secondary'); }
      if (icon) { icon.className = 'p-3 bg-secondary/10 rounded-full text-secondary shrink-0'; const sp = icon.querySelector('span'); if (sp) sp.innerText = 'check_circle'; }
      if (title) { title.innerText = 'All payments up to date'; title.classList.replace('text-error', 'text-secondary'); }
      if (desc) desc.innerText = 'No outstanding invoices right now.';
      if (reviewBtn) reviewBtn.className = 'text-sm font-medium text-secondary hover:opacity-80 underline decoration-secondary/30 underline-offset-4 transition-colors';
    }
    if (reviewBtn) reviewBtn.onclick = () => window.location.href = '/payment-recovery';
  } catch (err) {
    console.error('Failed to load alert', err);
    const title = document.getElementById('alert-title');
    const desc = document.getElementById('alert-desc');
    if (title) title.innerText = 'Could not load alerts';
    if (desc) desc.innerText = 'Please refresh the page to try again.';
  }

  // ---- Absent Members: live follow-up list ----
  try {
    const res = await window.api.fetch('/retention/inactive');
    if (!res.ok) throw new Error('Failed to fetch inactive members');
    const data = await res.json();
    const absent = [...(data.critical || []), ...(data.high || [])]
      .sort((a, b) => (b.absence_days || 0) - (a.absence_days || 0)).slice(0, 5);
    const list = document.getElementById('absent-list');
    const badge = document.getElementById('absent-count');
    if (badge) badge.innerText = (data.critical || []).length + (data.high || []).length;
    if (!absent.length) {
      list.innerHTML = `<p class="text-center text-xs text-on-surface-variant py-4">No members absent 20+ days. 🎉</p>`;
    } else {
      list.innerHTML = absent.map(m => {
        const initials = (m.full_name || '?').split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
        return `<div class="flex items-center justify-between cursor-pointer" onclick="window.location.href='/member-profile?id=${esc(m.id)}'">
          <div class="flex items-center gap-3">
            <div class="w-9 h-9 rounded-full bg-error/10 text-error flex items-center justify-center text-xs font-medium border border-error/20">${esc(initials)}</div>
            <div><p class="font-body-md font-medium text-on-surface line-clamp-1">${esc(m.full_name)}</p><p class="text-xs text-error">Absent ${esc(m.absence_days)} days</p></div>
          </div>
          <span class="material-symbols-outlined text-[18px] text-on-surface-variant">chevron_right</span>
        </div>`;
      }).join('');
    }
  } catch (err) {
    console.error('Failed to load absent members', err);
    const list = document.getElementById('absent-list');
    if (list) list.innerHTML = `<p class="text-center text-xs text-on-surface-variant py-4">Could not load absent members.</p>`;
  }

  // ---- Button wiring ----
  const retBtn = document.getElementById('view-retention-btn');
  if (retBtn) retBtn.onclick = () => window.location.href = '/retention';
  const manageRenewals = Array.from(document.querySelectorAll('button')).find(b => /Manage All Renewals/.test(b.textContent));
  if (manageRenewals) manageRenewals.onclick = () => window.location.href = '/payment-recovery';
  const newTaskBtn = Array.from(document.querySelectorAll('button')).find(b => /New Task/.test(b.textContent));
  if (newTaskBtn) newTaskBtn.onclick = async () => {
    const title = await window.promptDialog('What needs to get done?', { title: 'New Task', placeholder: 'Task title', confirmText: 'Create Task', required: true });
    if (!title) return;
    try {
      const r = await window.api.fetch('/tasks', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ title, priority: 'Medium' }) });
      if (r.ok) location.reload(); else alert('Could not create task.');
    } catch (e) { alert('Could not create task.'); }
  };
});
</script>
</body></html>
