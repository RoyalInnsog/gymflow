<!DOCTYPE html><html class="dark" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<link href="/assets/css/shared.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="/assets/js/designSystem.js"></script>
<script src="/assets/js/api.js"></script>
<script src="/assets/js/utils.js"></script>
<title>Kinetic SaaS - Members</title>

<style>
        /* Hide scrollbar for clean UI */
        ::-webkit-scrollbar { display: none; }
    </style>

</head>
<body class="font-body text-body-md antialiased min-h-screen md:pl-[280px] pt-16 transition-all duration-300">
<div id="jsb-header" data-page-title="Members"></div>
<div id="jsb-sidebar"></div>

<!-- TopAppBar -->

<!-- NavigationDrawer (Desktop) -->

<!-- Main Content -->
<main class="flex-1 px-margin-mobile md:px-margin-desktop py-lg max-w-7xl mx-auto w-full">
<!-- Header & Search -->
<div class="mb-lg flex flex-col gap-sm md:flex-row md:items-center md:justify-between">
<div>
<h2 class="font-headline-lg text-headline-lg text-on-background mb-1">Members</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant">Manage your gym roster and membership plans.</p>
</div>
<div class="flex items-center gap-xs w-full md:w-auto">
<div class="relative w-full md:w-80">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant/60" data-icon="search">search</span>
<input class="w-full bg-surface-container-high border border-[#2A2A2A] rounded-lg py-2 pl-10 pr-4 text-on-background font-body-sm text-body-sm focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all" placeholder="Search members..." type="text">
</div>
<button class="bg-surface-container-high border border-[#2A2A2A] rounded-lg p-2 text-on-surface-variant hover:bg-surface-container-highest transition-colors active:scale-95">
<span class="material-symbols-outlined" data-icon="tune">tune</span>
</button>
</div>
</div>
<!-- Filter Chips -->
<div class="flex overflow-x-auto gap-xs pb-sm mb-md -mx-margin-mobile px-margin-mobile md:mx-0 md:px-0 scroll-smooth">
<button class="whitespace-nowrap px-4 py-1.5 rounded-full bg-primary/10 border border-primary/50 text-primary font-label-sm text-label-sm transition-all">All</button>
<button class="whitespace-nowrap px-4 py-1.5 rounded-full bg-surface-container-high border border-[#2A2A2A] text-on-surface-variant hover:bg-surface-container-highest font-label-sm text-label-sm transition-all">Active</button>
<button class="whitespace-nowrap px-4 py-1.5 rounded-full bg-surface-container-high border border-[#2A2A2A] text-on-surface-variant hover:bg-surface-container-highest font-label-sm text-label-sm transition-all">Expired</button>
<button class="whitespace-nowrap px-4 py-1.5 rounded-full bg-surface-container-high border border-[#2A2A2A] text-on-surface-variant hover:bg-surface-container-highest font-label-sm text-label-sm transition-all">Pending</button>
<button class="whitespace-nowrap px-4 py-1.5 rounded-full bg-surface-container-high border border-[#2A2A2A] text-on-surface-variant hover:bg-surface-container-highest font-label-sm text-label-sm transition-all">New</button>
</div>
<!-- Member Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-gutter">
<!-- Member cards will be loaded dynamically via API -->
</div>
</main>
<!-- BottomNavBar (Mobile Only) -->

<script>
async function loadMembers(status = 'All', search = '') {
  try {
    const response = await window.api.fetch(`/members?status=${status}&search=${search}`);
    const members = await response.json();
    const grid = document.querySelector('.grid');
    grid.innerHTML = ''; // clear mock cards

    if (members.length === 0) {
      grid.innerHTML = `
        <div class="col-span-full py-16 flex flex-col items-center justify-center text-center opacity-85">
          <span class="material-symbols-outlined text-on-surface-variant/30 mb-4" style="font-size: 64px;">group_off</span>
          <h3 class="font-headline-md text-on-surface mb-2 text-xl font-semibold">No Members Registered</h3>
          <p class="text-on-surface-variant max-w-sm mb-6 text-sm">Welcome to <span class="dynamic-gym-name">JSB Fitness</span>! Add your very first member to get started with the system onboarding.</p>
          <button onclick="window.location.href='/add-member-step-1'" class="bg-primary text-on-primary font-label-md px-6 py-2.5 rounded-lg hover:opacity-90 transition-opacity flex items-center gap-2">
            <span class="material-symbols-outlined text-[18px]">add</span> Add First Member
          </button>
        </div>
      `;
      return;
    }

    members.forEach(m => {
      let statusClass = 'status-active';
      let statusIcon = 'schedule';
      if (m.status === 'Expired') {
        statusClass = 'status-expired';
        statusIcon = 'warning';
      } else if (m.status === 'Pending') {
        statusClass = 'status-pending';
        statusIcon = 'hourglass_empty';
      }

      const photo = m.photo_url || 'https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=150&auto=format&fit=crop';
      const initials = m.full_name ? m.full_name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2) : 'GYM';
      const card = document.createElement('div');
      card.className = `glass-card rounded-xl p-md flex flex-col gap-md transition-colors group cursor-pointer`;
      card.onclick = () => window.location.href = `/member-profile?id=${m.id}`;
      card.innerHTML = `
        <div class="flex items-start justify-between">
          <div class="flex items-center gap-sm">
            <div class="w-12 h-12 rounded-full overflow-hidden border border-[#2A2A2A] shrink-0 bg-surface-container flex items-center justify-center text-primary font-bold">
              <img alt="Profile" class="w-full h-full object-cover" src="${photo}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"/>
              <span class="hidden w-full h-full items-center justify-center text-body-lg font-bold bg-primary/10 text-primary">${initials}</span>
            </div>
            <div>
              <h3 class="font-headline-md text-headline-md text-on-background text-[18px]">${m.full_name}</h3>
              <p class="font-label-sm text-label-sm text-on-surface-variant">${m.phone}</p>
            </div>
          </div>
          <button class="text-on-surface-variant/50 hover:text-on-surface-variant transition-colors" onclick="event.stopPropagation();">
            <span class="material-symbols-outlined">more_vert</span>
          </button>
        </div>
        <div class="flex items-center justify-between mt-auto pt-sm border-t border-[#2A2A2A]/50">
          <span class="inline-flex items-center justify-center px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider ${statusClass}">${m.status}</span>
          <span class="font-label-sm text-label-sm text-on-surface-variant flex items-center gap-1">
            <span class="material-symbols-outlined text-[16px]">${statusIcon}</span> ${m.daysLeft || 0} days left
          </span>
        </div>
      `;
      grid.appendChild(card);
    });
  } catch (err) {
    console.error('Error loading members:', err);
  }
}

// Attach filter events
const chips = document.querySelectorAll('.flex.overflow-x-auto button');
chips.forEach(chip => {
  chip.addEventListener('click', (e) => {
    // Reset other chips styling
    chips.forEach(c => {
      c.className = "whitespace-nowrap px-4 py-1.5 rounded-full bg-surface-container-high border border-[#2A2A2A] text-on-surface-variant hover:bg-surface-container-highest font-label-sm text-label-sm transition-all";
    });
    // Active chip style
    chip.className = "whitespace-nowrap px-4 py-1.5 rounded-full bg-primary/10 border border-primary/50 text-primary font-label-sm text-label-sm transition-all";
    loadMembers(chip.innerText);
  });
});

// Attach search input event
const searchInput = document.querySelector('input[placeholder="Search members..."]');
if (searchInput) {
  searchInput.addEventListener('input', (e) => {
    const activeChip = Array.from(chips).find(c => c.className.includes('0ea5e9'));
    const status = activeChip ? activeChip.innerText : 'All';
    loadMembers(status, e.target.value);
  });
}

// Initial load
loadMembers();
</script>

<div id="jsb-mobile-nav"></div>
</body></html>
