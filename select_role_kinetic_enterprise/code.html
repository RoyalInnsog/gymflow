<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link href="/assets/css/shared.css" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/tailwind.css">
    <script>
        window.__gymAppShellInjected = true;
        window.__gfOnboarding = true;
    </script>
    <script src="/assets/js/designSystem.js"></script>
    <script src="/assets/js/api.js"></script>
    <!-- Gym Flow Offline-First layer (Phase F4A) -->
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="theme-color" content="#0f172a">
    <script src="/assets/js/offline/idb.js"></script>
    <script src="/assets/js/offline/localdb.js"></script>
    <script src="/assets/js/offline/netTransport.js"></script>
    <script src="/assets/js/offline/routeRegistry.js"></script>
    <script src="/assets/js/offline/outbox.js"></script>
    <script src="/assets/js/offline/syncEngine.js"></script>
    <script src="/assets/js/offline/networkWatcher.js"></script>
    <script src="/assets/js/offline/repositories.js"></script>
    <script src="/assets/js/offline/apiOffline.js"></script>
    <script src="/assets/js/offline/offlineBootstrap.js"></script>
    <!-- /Gym Flow Offline-First layer -->
    <script src="/assets/js/utils.js"></script>
    <title>Gym Flow - Choose Role</title>
    <style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-smoothing: antialiased;
        }
        .bg-mesh {
            background-color: #131313;
            background-image:
                radial-gradient(at 0% 0%, rgba(53, 53, 53, 0.4) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(31, 31, 31, 0.5) 0px, transparent 50%);
        }
    </style>
</head>
<body class="bg-mesh min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop text-on-surface font-body-md antialiased selection:bg-primary/30 selection:text-primary">

<!-- Background lights -->
<div class="absolute top-1/4 left-1/4 w-96 h-96 bg-surface-variant/20 rounded-full blur-[120px] pointer-events-none"></div>
<div class="absolute bottom-1/4 right-1/4 w-[500px] h-[500px] bg-primary/5 rounded-full blur-[150px] pointer-events-none"></div>

<main class="w-full max-w-[500px] md:max-w-[580px] relative z-10 flex flex-col">
    <div class="bg-surface-container/60 backdrop-blur-xl border border-outline-variant/30 rounded-xl p-8 md:p-10 shadow-2xl flex flex-col relative overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-br from-surface-bright/10 to-transparent pointer-events-none"></div>
        <div class="relative z-10">
            <!-- Brand / Logo -->
            <div class="flex justify-center mb-xl">
                <div class="h-16 w-16 flex items-center justify-center rounded-lg bg-surface-container-highest border border-outline-variant/50 shadow-inner">
                    <span id="logo-icon" class="material-symbols-outlined text-4xl text-primary" style="font-variation-settings: 'FILL' 1;">switch_account</span>
                </div>
            </div>

            <!-- Headers -->
            <div class="text-center mb-xl">
                <h1 id="page-title" class="font-headline-lg text-headline-lg text-on-surface mb-xs uppercase">Choose Account</h1>
                <p id="signed-in-as" class="font-body-sm text-body-sm text-on-surface-variant">Verifying your access&hellip;</p>
            </div>

            <!-- Role picker cards or lists -->
            <div id="role-list" class="flex flex-col gap-md" role="list" aria-label="Choices">
                <div class="flex items-center justify-center py-8">
                    <span class="material-symbols-outlined text-[28px] text-on-surface-variant/60 animate-spin">progress_activity</span>
                </div>
            </div>

            <!-- Divider -->
            <div class="flex items-center gap-4 my-xl">
                <div class="h-px bg-outline-variant/30 flex-1"></div>
                <span class="font-label-caps text-label-caps text-on-surface-variant/60 tracking-widest">OR</span>
                <div class="h-px bg-outline-variant/30 flex-1"></div>
            </div>

            <!-- Logout button -->
            <button id="logout-btn" class="w-full bg-surface-container-low border border-outline-variant/40 text-on-surface py-3.5 rounded-lg font-label-caps text-label-caps tracking-widest hover:bg-surface-container hover:border-outline-variant transition-all flex items-center justify-center gap-3" type="button">
                <span class="material-symbols-outlined text-[20px] text-primary">logout</span>
                <span>SIGN OUT</span>
            </button>
        </div>
    </div>
    
    <div id="footer-text" class="text-center mt-8 font-body-sm text-body-sm text-on-surface-variant/50">
        <p>One account can hold different roles at different gyms.</p>
    </div>
</main>

<script>
(function () {
  var listEl = document.getElementById('role-list');
  var whoEl = document.getElementById('signed-in-as');
  var titleEl = document.getElementById('page-title');
  var logoEl = document.getElementById('logo-icon');
  var footerEl = document.getElementById('footer-text');
  var busy = false;

  var ROLE_META = {
    r1: { icon: 'storefront',           label: 'Owner' },
    r2: { icon: 'admin_panel_settings', label: 'Manager' },
    r3: { icon: 'sports',               label: 'Trainer' },
    r4: { icon: 'badge',                label: 'Admin' },
    r5: { icon: 'fitness_center',       label: 'Member' }
  };

  function fail(msg) {
    listEl.innerHTML = '<div class="text-center py-6 font-body-sm text-body-sm text-error">' + window.esc(msg) + '</div>';
  }

  function pick(role, card) {
    if (busy) return;
    busy = true;
    if (card) card.classList.add('opacity-60', 'pointer-events-none');
    window.api.fetch('/auth/select-role', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tenant_id: role.tenant_id, role_id: role.role_id })
    }).then(async function (r) {
      var data = await r.json().catch(function () { return {}; });
      if (r.ok) {
        window.location.href = (data && data.redirect) || '/';
      } else {
        busy = false;
        if (card) card.classList.remove('opacity-60', 'pointer-events-none');
        if (window.toast) window.toast(data.error || 'Could not open that account.', 'error');
        else alert(data.error || 'Could not open that account.');
      }
    }).catch(function () {
      busy = false;
      if (card) card.classList.remove('opacity-60', 'pointer-events-none');
      if (window.toast) window.toast('Connection lost. Please try again.', 'error');
    });
  }

  function selectPlatformRole(role, card) {
    if (busy) return;
    busy = true;
    card.classList.add('opacity-60', 'pointer-events-none');
    window.api.fetch('/auth/platform-role', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ role: role })
    }).then(async function (r) {
      var data = await r.json().catch(function () { return {}; });
      if (r.ok) {
        window.location.href = data.redirect || '/';
      } else {
        busy = false;
        card.classList.remove('opacity-60', 'pointer-events-none');
        if (window.toast) window.toast(data.error || 'Failed to select role.', 'error');
        else alert(data.error || 'Failed to select role.');
      }
    }).catch(function () {
      busy = false;
      card.classList.remove('opacity-60', 'pointer-events-none');
      if (window.toast) window.toast('Connection lost. Please try again.', 'error');
    });
  }

  function renderRoles(roles) {
    titleEl.textContent = "Choose Account";
    logoEl.textContent = "switch_account";
    footerEl.innerHTML = "<p>One account can hold different roles at different gyms.</p>";
    listEl.innerHTML = '';
    
    roles.forEach(function (role) {
      var meta = ROLE_META[role.role_id] || { icon: 'person', label: role.role_name || 'Account' };
      var isMember = role.role_id === 'r5';
      var card = document.createElement('button');
      card.type = 'button';
      card.setAttribute('role', 'listitem');
      card.className = 'w-full flex items-center gap-4 bg-surface-container-lowest border border-outline-variant/40 rounded-lg p-4 text-left hover:border-primary/60 hover:bg-surface-container-low focus:outline-none focus:ring-2 focus:ring-primary/40 active:scale-[0.99] transition-all group';
      card.innerHTML =
        '<div class="h-12 w-12 shrink-0 flex items-center justify-center rounded-lg ' + (isMember ? 'bg-primary/10' : 'bg-surface-container-highest') + ' border border-outline-variant/40">' +
          '<span class="material-symbols-outlined text-[24px] text-primary">' + meta.icon + '</span>' +
        '</div>' +
        '<div class="flex-1 min-w-0">' +
          '<div class="font-body-md text-body-md text-on-surface font-semibold truncate">' + window.esc(role.gym_name || 'Gym') + '</div>' +
          '<div class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest mt-0.5">' + window.esc(role.role_name || meta.label) + '</div>' +
        '</div>' +
        '<span class="material-symbols-outlined text-[20px] text-on-surface-variant/50 group-hover:text-primary group-hover:translate-x-0.5 transition-all">arrow_forward</span>';
      card.addEventListener('click', function () { pick(role, card); });
      listEl.appendChild(card);
    });
  }

  function renderPlatformRoleSelection() {
    titleEl.textContent = "Choose Your Role";
    logoEl.textContent = "diversity_3";
    footerEl.innerHTML = "<p>Select your primary platform role to get started.</p>";
    listEl.innerHTML = '';

    // Card 1: Admin
    var adminCard = document.createElement('button');
    adminCard.type = 'button';
    adminCard.className = 'w-full flex flex-col items-center text-center p-6 bg-surface-container-lowest border border-outline-variant/40 rounded-xl hover:border-primary/60 hover:bg-surface-container-low focus:outline-none focus:ring-2 focus:ring-primary/40 active:scale-[0.99] transition-all duration-200 group';
    adminCard.innerHTML = `
      <div class="h-16 w-16 mb-4 flex items-center justify-center rounded-full bg-primary/10 border border-primary/20 group-hover:scale-110 transition-transform">
        <span class="material-symbols-outlined text-3xl text-primary">fitness_center</span>
      </div>
      <h3 class="font-headline-sm text-headline-sm font-bold text-on-surface mb-2">Gym Owner / Admin</h3>
      <p class="font-body-sm text-body-sm text-on-surface-variant max-w-[280px]">Manage members, handle subscriptions, track finances, and run staff operations.</p>
    `;
    adminCard.addEventListener('click', function () { selectPlatformRole('ADMIN', adminCard); });

    // Card 2: Member
    var memberCard = document.createElement('button');
    memberCard.type = 'button';
    memberCard.className = 'w-full flex flex-col items-center text-center p-6 bg-surface-container-lowest border border-outline-variant/40 rounded-xl hover:border-primary/60 hover:bg-surface-container-low focus:outline-none focus:ring-2 focus:ring-primary/40 active:scale-[0.99] transition-all duration-200 group relative';
    memberCard.innerHTML = `
      <div class="absolute top-4 right-4 bg-primary/20 border border-primary/30 text-primary text-[10px] tracking-widest uppercase font-semibold px-2 py-0.5 rounded-full">Coming Soon</div>
      <div class="h-16 w-16 mb-4 flex items-center justify-center rounded-full bg-surface-container-highest border border-outline-variant/40 group-hover:scale-110 transition-transform">
        <span class="material-symbols-outlined text-3xl text-on-surface-variant">person</span>
      </div>
      <h3 class="font-headline-sm text-headline-sm font-bold text-on-surface mb-2">Gym Member</h3>
      <p class="font-body-sm text-body-sm text-on-surface-variant max-w-[280px]">View your classes, log attendance with QR code, and track your active membership status.</p>
    `;
    memberCard.addEventListener('click', function () { selectPlatformRole('MEMBER', memberCard); });

    listEl.appendChild(adminCard);
    listEl.appendChild(memberCard);
  }

  (async function () {
    try {
      var r = await window.api.fetch('/auth/session');
      if (r.status === 401 || r.status === 403) { window.location.href = '/login'; return; }
      var data = await r.json();
      
      if (data && data.user && data.user.email) {
        whoEl.textContent = 'Signed in as ' + data.user.email;
      }
      
      // If user's platform role is not selected yet, show the cards!
      if (data && data.user && !data.user.platform_role) {
        renderPlatformRoleSelection();
        return;
      }

      var roles = (data && data.roles) || [];
      if (roles.length === 0) { fail('No access roles are linked to this account. Please contact your gym.'); return; }
      // A single role never needs a picker — finalize it and go straight in.
      if (roles.length === 1) { pick(roles[0], null); return; }
      renderRoles(roles);
    } catch (e) {
      fail('Could not load account details. Check your connection and refresh.');
    }
  })();

  document.getElementById('logout-btn').addEventListener('click', async function () {
    try { await window.api.fetch('/auth/logout', { method: 'POST' }); } catch (e) {}
    window.location.href = '/login';
  });
})();
</script>
</body>
</html>
