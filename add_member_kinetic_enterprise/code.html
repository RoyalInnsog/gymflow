<!-- Floating Save Button Zone -->
<div class="jsb-action-bar fixed bottom-0 left-0 w-full px-margin-mobile pb-margin-mobile pt-12 bg-gradient-to-t from-background via-background/90 to-transparent pointer-events-none z-50 flex justify-center">
<button class="pointer-events-auto w-full max-w-2xl bg-primary text-on-primary font-body-md font-semibold py-4 rounded-xl shadow-[0_4px_24px_rgba(198,198,198,0.15)] hover:bg-surface-tint active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check_circle</span>
            Save Member Profile
        </button>
</div>
<script>
document.addEventListener("DOMContentLoaded", () => {
  const backBtn = document.querySelector('header button');
  if (backBtn) {
    backBtn.onclick = () => window.location.href = '/add-member-step-1';
  }

  // Retrieve temporary info from step 1
  const savedDataStr = sessionStorage.getItem('temp_member_onboarding');
  let savedData = {};
  if (savedDataStr) {
    savedData = JSON.parse(savedDataStr);
  }

  // Pre-fill fields
  const inputs = document.querySelectorAll('input[type="text"], input[type="tel"], input[type="email"]');
  if (inputs.length >= 3) {
    inputs[0].value = savedData.full_name || '';
    inputs[1].value = savedData.phone || '';
    inputs[2].value = savedData.email || '';
  }

  // ─── Draft persistence ──────────────────────────────────────────────────────
  // Every entered value survives a refresh AND the "no plans → create plan in
  // Settings → return" detour. Draft is cleared only on successful save.
  const DRAFT_KEY = 'gf_add_member_draft';

  function readDraft() {
    try { return JSON.parse(sessionStorage.getItem(DRAFT_KEY)) || {}; }
    catch (e) { return {}; }
  }
  function writeDraft(d) {
    try { sessionStorage.setItem(DRAFT_KEY, JSON.stringify(d)); }
    catch (e) {
      // Quota (usually the base64 photo) — persist everything else.
      try { const { photo, ...rest } = d; sessionStorage.setItem(DRAFT_KEY, JSON.stringify(rest)); }
      catch (e2) { /* storage unavailable — non-fatal */ }
    }
  }
  const draft = readDraft();

  // Calculate BMI dynamically
  const heightInput = document.querySelector('input[placeholder="0"]');
  const weightInput = document.querySelector('input[placeholder="0.0"]');
  const bmiInput = document.querySelector('input[placeholder="--"]');

  function updateBMI() {
    const hCm = parseFloat(heightInput.value);
    const wKg = parseFloat(weightInput.value);
    if (hCm > 0 && wKg > 0) {
      const hM = hCm / 100;
      const bmi = wKg / (hM * hM);
      bmiInput.value = bmi.toFixed(1);
    } else {
      bmiInput.value = '--';
    }
  }

  if (heightInput && weightInput) {
    heightInput.addEventListener('input', updateBMI);
    weightInput.addEventListener('input', updateBMI);
  }

  // ─── Dynamic plan loader ────────────────────────────────────────────────────
  const planSelect   = document.getElementById('planSelect');
  const planError    = document.getElementById('planLoadError');
  const planEmpty    = document.getElementById('planEmptyMsg');
  const retryBtn     = document.getElementById('retryPlansBtn');

  /**
   * Build a human-readable duration label from a plan record.
   * e.g. "12 Months", "90 Days", "1 Month"
   */
  function durationLabel(plan) {
    if (plan.duration_months && plan.duration_months > 0) {
      return plan.duration_months === 1
        ? '1 Month'
        : `${plan.duration_months} Months`;
    }
    if (plan.duration_days && plan.duration_days > 0) {
      return plan.duration_days === 1
        ? '1 Day'
        : `${plan.duration_days} Days`;
    }
    return 'Custom';
  }

  /**
   * Format a price with the currency symbol.
   * Uses window.APP_CONFIG.currency if available, falls back to ₹.
   */
  function formatPrice(price) {
    // APP_CONFIG.currency is an object ({ symbol, code, ... }); fall back gracefully
    // if a plain string or nothing is provided.
    const c = window.APP_CONFIG?.currency;
    const symbol = (c && typeof c === 'object') ? (c.symbol || '₹') : (c || '₹');
    return `${symbol}${Number(price).toLocaleString()}`;
  }

  async function loadPlans() {
    // Show loading state
    planSelect.disabled = true;
    planSelect.innerHTML = '<option disabled selected value="">Loading plans...</option>';
    planError.classList.add('hidden');
    planEmpty.classList.add('hidden');

    try {
      const response = await window.api.fetch('/plans');
      if (!response.ok) throw new Error(`HTTP ${response.status}`);

      const plans = await response.json();

      planSelect.innerHTML = ''; // clear loading option

      if (!plans || plans.length === 0) {
        // Empty state — no plans configured yet
        planSelect.innerHTML = '<option disabled selected value="">No plans available</option>';
        planEmpty.classList.remove('hidden');
        planSelect.disabled = true;
        // Auto-detour (once per session): persist the draft, then take the user
        // to Settings → Membership Plans. After they create a plan, Settings
        // sends them back here and the draft below restores every field.
        if (!sessionStorage.getItem('gf_plan_redirect_done')) {
          sessionStorage.setItem('gf_plan_redirect_done', '1');
          sessionStorage.setItem('gf_return_to', '/add-member');
          saveDraftNow();
          window.toast && window.toast('No membership plans yet — taking you to create one.', 'info');
          setTimeout(() => { window.location.href = '/settings#membership-plans'; }, 900);
        }
        return;
      }

      // Default placeholder
      const placeholder = document.createElement('option');
      placeholder.value = '';
      placeholder.disabled = true;
      placeholder.selected = true;
      placeholder.textContent = 'Choose a membership tier...';
      planSelect.appendChild(placeholder);

      // Populate options — value is the real DB plan id
      plans.forEach(plan => {
        const opt = document.createElement('option');
        opt.value = plan.id;
        // Label: "Annual Pro Elite Plan (12 Months) — ₹12,000"
        opt.textContent = `${plan.name} (${durationLabel(plan)}) — ${formatPrice(plan.price)}`;
        // Store full plan data on the element for later use
        opt.dataset.durationMonths = plan.duration_months || 0;
        opt.dataset.durationDays   = plan.duration_days   || 0;
        opt.dataset.price          = plan.price || 0;
        planSelect.appendChild(opt);
      });

      planSelect.disabled = false;

      // Restore a drafted plan choice (e.g. returning from the Settings detour).
      if (draft.plan_id) {
        for (const o of planSelect.options) {
          if (o.value === draft.plan_id) {
            planSelect.value = draft.plan_id;
            recalcEndDate();
            break;
          }
        }
      }

    } catch (err) {
      console.error('Failed to load membership plans:', err);
      planSelect.innerHTML = '<option disabled selected value="">Failed to load plans</option>';
      planError.classList.remove('hidden');
      planSelect.disabled = true;
    }
  }

  // Retry button
  if (retryBtn) {
    retryBtn.addEventListener('click', loadPlans);
  }

  // Initial load
  loadPlans();
  // ─────────────────────────────────────────────────────────────────────────────

  // ─── Photo upload (preview + capture as data URL) ───────────────────────────
  let uploadedPhoto = null; // base64 data URL, sent to server as photo_url
  const photoInput   = document.getElementById('photoInput');
  const photoPreview = document.getElementById('photoPreview');
  const photoIcon    = document.getElementById('photoIcon');
  const photoLabel   = document.getElementById('photoLabel');
  const removeBtn    = document.getElementById('removePhotoBtn');

  if (photoInput) {
    photoInput.addEventListener('change', () => {
      const file = photoInput.files && photoInput.files[0];
      if (!file) return;
      if (!file.type.startsWith('image/')) {
        alert('Please choose an image file.');
        photoInput.value = '';
        return;
      }
      if (file.size > 2 * 1024 * 1024) {
        alert('Image is too large. Please choose a file under 2 MB.');
        photoInput.value = '';
        return;
      }
      const reader = new FileReader();
      reader.onload = (e) => {
        uploadedPhoto = e.target.result;
        photoPreview.src = uploadedPhoto;
        photoPreview.classList.remove('hidden');
        photoIcon.classList.add('hidden');
        photoLabel.textContent = 'Change';
        photoLabel.className = 'font-label-sm text-label-sm relative z-10 bg-black/50 px-2 rounded';
        if (removeBtn) removeBtn.classList.remove('hidden');
        queueDraftSave(); // photo lands async — persist it once decoded
      };
      reader.readAsDataURL(file);
    });
  }

  if (removeBtn) {
    removeBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      e.preventDefault();
      uploadedPhoto = null;
      photoInput.value = '';
      photoPreview.src = '';
      photoPreview.classList.add('hidden');
      photoIcon.classList.remove('hidden');
      photoLabel.textContent = 'Upload';
      photoLabel.className = 'font-label-sm text-label-sm';
      removeBtn.classList.add('hidden');
      queueDraftSave();
    });
  }

  // ─── Auto-calculate End Date from plan duration + start date ─────────────────
  const startDateEl = document.getElementById('startDate');
  const endDateEl   = document.getElementById('endDate');

  function recalcEndDate() {
    if (!startDateEl || !endDateEl || !window.MembershipEngine) return;
    const opt = planSelect.options[planSelect.selectedIndex];
    const start = startDateEl.value;
    if (!start || !opt || !opt.value) return;
    const months = parseInt(opt.dataset.durationMonths || '0', 10);
    const days   = parseInt(opt.dataset.durationDays   || '0', 10);
    if (!months && !days) return;
    // Single source of truth — same engine the server uses (leap-year and
    // month-end clamping handled centrally, zero drift between client/server).
    endDateEl.value = window.MembershipEngine.computeEndDate(start, {
      duration_months: months,
      duration_days: days
    });
  }

  if (planSelect)   planSelect.addEventListener('change', recalcEndDate);
  if (startDateEl)  startDateEl.addEventListener('change', recalcEndDate);
  // ─────────────────────────────────────────────────────────────────────────────

  // ─── Draft restore + autosave ────────────────────────────────────────────────
  if (draft.full_name != null) inputs[0].value = draft.full_name;
  if (draft.phone     != null) inputs[1].value = draft.phone;
  if (draft.email     != null) inputs[2].value = draft.email;
  if (draft.height) heightInput.value = draft.height;
  if (draft.weight) weightInput.value = draft.weight;
  if (draft.height || draft.weight) updateBMI();
  if (draft.start) startDateEl.value = draft.start;
  if (draft.end)   endDateEl.value   = draft.end;
  if (draft.photo) {
    uploadedPhoto = draft.photo;
    photoPreview.src = uploadedPhoto;
    photoPreview.classList.remove('hidden');
    photoIcon.classList.add('hidden');
    photoLabel.textContent = 'Change';
    photoLabel.className = 'font-label-sm text-label-sm relative z-10 bg-black/50 px-2 rounded';
    if (removeBtn) removeBtn.classList.remove('hidden');
  }

  function collectDraft() {
    return {
      full_name: inputs[0].value,
      phone:     inputs[1].value,
      email:     inputs[2].value,
      height:    heightInput.value,
      weight:    weightInput.value,
      plan_id:   planSelect.value || '',
      start:     startDateEl.value,
      end:       endDateEl.value,
      photo:     uploadedPhoto || ''
    };
  }
  function saveDraftNow() { writeDraft(collectDraft()); }
  let draftTimer = null;
  function queueDraftSave() {
    clearTimeout(draftTimer);
    draftTimer = setTimeout(saveDraftNow, 250);
  }
  // One delegated listener pair instead of one per field.
  const mainEl = document.querySelector('main');
  mainEl.addEventListener('input',  queueDraftSave);
  mainEl.addEventListener('change', queueDraftSave);
  // ─────────────────────────────────────────────────────────────────────────────

  // Handle Save
  const saveBtn = document.querySelector('.pointer-events-auto');
  if (saveBtn) {
    saveBtn.onclick = async (e) => {
      e.preventDefault();

      const name  = inputs[0].value.trim();
      const phone = inputs[1].value.trim();
      const email = inputs[2].value.trim();

      if (!name || !phone) {
        alert('Name and Phone are required.');
        return;
      }

      const height = parseFloat(heightInput.value) || 0;
      const weight = parseFloat(weightInput.value) || 0;
      const bmi    = parseFloat(bmiInput.value)    || 0;

      // planId is now the real DB id directly from the select value
      const planId = planSelect.value || null;

      if (!planId) {
        alert('Membership plan selection is required.');
        return;
      }

      const dateInputs = document.querySelectorAll('input[type="date"]');
      const start = dateInputs[0]?.value || '';
      const end   = dateInputs[1]?.value || '';

      // Client-side date validation
      if (start && end) {
        const startTs = new Date(start).getTime();
        const endTs   = new Date(end).getTime();
        if (isNaN(startTs) || isNaN(endTs)) {
          alert('One or both dates are invalid. Please use the date picker to select valid dates.');
          return;
        }
        if (startTs >= endTs) {
          alert('Start Date must be before End Date. Please correct the membership dates.');
          return;
        }
      } else if (!start && end) {
        alert('A Start Date is required when an End Date is specified.');
        return;
      }
      // start only, or both empty → server applies safe defaults

      const body = {
        full_name: name,
        phone:     phone,
        email:     email,
        dob:                     savedData.dob                    || '',
        gender:                  savedData.gender                 || 'male',
        emergency_contact_name:  savedData.emergency_contact_name || '',
        emergency_contact_phone: savedData.emergency_contact_phone|| '',
        height_cm:  height,
        weight_kg:  weight,
        bmi:        bmi,
        plan_id:    planId,
        start_date: start || '',
        end_date:   end   || '',
        photo_url:  uploadedPhoto || ''
      };

      try {
        const response = await window.api.fetch('/members', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });

        // Parse defensively: error responses (e.g. 413 Payload Too Large) may be
        // HTML, not JSON, so response.json() would throw and mask the real cause.
        let resData = {};
        try { resData = await response.json(); } catch (_) { resData = {}; }

        if (response.ok) {
          sessionStorage.removeItem('temp_member_onboarding');
          sessionStorage.removeItem(DRAFT_KEY);
          sessionStorage.removeItem('gf_return_to');
          sessionStorage.removeItem('gf_plan_redirect_done');
          const newMemberId = resData.memberId || resData.member_id || '';
          window.location.href = `/payment-center?member_id=${newMemberId}`;
        } else if (response.status === 413) {
          alert('The photo is too large to upload. Please choose a smaller image (under 2 MB).');
        } else {
          alert(resData.error || `Failed to save member profile (error ${response.status}).`);
        }
      } catch (err) {
        console.error(err);
        alert('Could not reach the server. Please check your connection and try again.');
      }
    };
  }
});
</script>

<!-- Focused flow: global bottom nav intentionally suppressed (back link used instead) -->
