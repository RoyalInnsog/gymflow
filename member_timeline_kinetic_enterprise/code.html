<!-- Recent Communications -->

<script>
    document.addEventListener("DOMContentLoaded", async () => {
      const urlParams = new URLSearchParams(window.location.search);
      const memberId = urlParams.get('id') || 'm7';
      
      const backBtn = document.getElementById('timeline-back-btn');
      if (backBtn) {
        backBtn.onclick = (e) => {
          e.preventDefault();
          window.location.href = `/member-profile?id=${memberId}`;
        };
      }

      const renewBtn = document.getElementById('timeline-renew-btn');
      if (renewBtn) {
        renewBtn.onclick = () => {
          window.location.href = `/renew?id=${memberId}`;
        };
      }

      const messageBtn = document.getElementById('timeline-message-btn');
      if (messageBtn) {
        messageBtn.onclick = () => {
          window.location.href = `/marketing`;
        };
      }
      
      try {
        const response = await window.api.fetch(`/members/${memberId}`);
        const data = await response.json();
        if (!response.ok) return;

        const { member, timeline, membership, communications } = data;
        
        document.title = `Member Timeline - ${member.full_name}`;
        
        // Update header details
        document.getElementById('member-name').innerText = member.full_name;
        document.getElementById('member-id-display').innerText = `ID: ${member.id}`;
        document.getElementById('member-status-badge').innerText = member.status;
        const initials = member.full_name ? member.full_name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2) : 'GYM';
        const fallbackSpan = document.getElementById('member-photo-fallback');
        if (fallbackSpan) {
          fallbackSpan.innerText = initials;
        }
        if (member.photo_url) {
          document.getElementById('member-photo').src = member.photo_url;
        }

        const indicator = document.getElementById('member-status-indicator');
        if (indicator) {
          if (member.status === 'Active') {
            indicator.className = "absolute bottom-0 right-0 w-4 h-4 bg-secondary rounded-full border-2 border-background";
          } else {
            indicator.className = "absolute bottom-0 right-0 w-4 h-4 bg-error rounded-full border-2 border-background";
          }
        }

        // Update sidebar plan details
        if (membership) {
          document.getElementById('sidebar-membership-plan').innerText = membership.plan_name;
          document.getElementById('sidebar-membership-dates').innerText = `Valid: ${membership.start_date} to ${membership.end_date}`;
        }

        // Calculate lifetime value
        let ltv = 0;
        timeline.forEach(event => {
          if (event.type === 'Payment' && event.title === 'Payment Received') {
            const numVal = parseInt(event.details.replace(/[^\d]/g, ''), 10);
            if (!isNaN(numVal)) {
              ltv += numVal;
            }
          }
        });
        document.getElementById('sidebar-ltv').innerText = '₹' + Number(ltv).toLocaleString();

        // Update Direct message alerts outbox
        const commsListContainer = document.getElementById('sidebar-comms-list');
        if (commsListContainer && communications) {
          commsListContainer.innerHTML = '';
          const directComms = communications.slice(0, 4);
          if (directComms.length === 0) {
            commsListContainer.innerHTML = '<p class="text-xs text-on-surface-variant italic">No message alerts sent.</p>';
          } else {
            directComms.forEach(c => {
              const div = document.createElement('div');
              div.className = 'flex gap-3 text-xs border-b border-white/5 pb-2 last:border-b-0';
              div.innerHTML = `
                <div class="w-6 h-6 rounded-full bg-[#25D366]/20 flex items-center justify-center shrink-0">
                  <span class="material-symbols-outlined text-[#25D366] text-[12px]">forum</span>
                </div>
                <div>
                  <p class="font-body-md text-on-surface line-clamp-1">${esc(c.title)}</p>
                  <p class="text-on-surface-variant line-clamp-2 mt-0.5 font-light">${esc(c.message)}</p>
                  <p class="text-[10px] text-outline mt-0.5">${new Date(c.created_at).toLocaleDateString()}</p>
                </div>
              `;
              commsListContainer.appendChild(div);
            });
          }
        }
        
        // Update Timeline list
        const timelineList = document.getElementById('timeline-list');
        if (timelineList && timeline.length > 0) {
          timelineList.innerHTML = '';
          timeline.forEach(event => {
            let icon = 'info';
            let color = 'text-primary';
            let bg = 'bg-primary/10';
            
            if (event.type === 'System') {
              icon = 'flag';
              color = 'text-outline';
              bg = 'bg-surface-container';
            } else if (event.type === 'Attendance') {
              icon = 'fitness_center';
              color = 'text-secondary';
              bg = 'bg-secondary/10';
            } else if (event.type === 'Membership') {
              icon = 'autorenew';
              color = 'text-primary';
              bg = 'bg-primary/10';
            } else if (event.type === 'Payment') {
              icon = 'payments';
              color = 'text-tertiary';
              bg = 'bg-tertiary/10';
            } else if (event.type === 'Retention') {
              icon = 'warning';
              color = 'text-error';
              bg = 'bg-error/10';
            } else if (event.type === 'Communication') {
              icon = 'forum';
              color = 'text-[#25D366]';
              bg = 'bg-[#25D366]/10';
            }

            const card = document.createElement('div');
            card.className = 'relative z-10 pl-0 sm:pl-16 group';
            card.innerHTML = `
              <div class="absolute left-0 top-1/2 -translate-y-1/2 w-14 h-14 rounded-full ${bg} border border-white/10 flex items-center justify-center hidden sm:flex z-20 group-hover:scale-110 transition-transform">
                <span class="material-symbols-outlined ${color}">${icon}</span>
              </div>
              <div class="glass-panel rounded-xl p-6 transition-all duration-300 hover:border-white/20">
                <div class="flex justify-between items-start mb-2">
                  <div class="flex items-center gap-2">
                    <span class="px-2 py-1 rounded ${bg} ${color} font-label-md text-label-md text-[10px] uppercase tracking-wider border border-white/5">${event.type}</span>
                    <span class="font-body-md text-body-md text-on-surface-variant text-sm">${event.date}</span>
                  </div>
                </div>
                <h3 class="font-title-lg text-title-lg text-on-surface mb-1">${esc(event.title)}</h3>
                <p class="font-body-md text-body-md text-on-surface-variant">${esc(event.details)}</p>
              </div>
            `;
            timelineList.appendChild(card);
          });
        } else {
          timelineList.innerHTML = '<p class="text-center text-on-surface-variant py-8">No timeline events found for this member.</p>';
        }
      } catch (err) {
        console.error(err);
      }
    });
    </script>
