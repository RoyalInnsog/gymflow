<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="color-scheme" content="dark" />
  <!--
    Hybrid launcher (Capacitor 8, bundled MPA). Served at https://localhost by
    the Capacitor local server. Every PAGE of the app is bundled in this APK
    (www/<route>/index.html, generated by mobile/build-www.js from the same
    code.html sources the Express server renders); only the /api/v1 backend is
    remote. This splash decides where to land:

      GET {API_BASE}/api/v1/auth/session
        200            -> replicate server.js shellForRole/shellRedirectFor:
                          pending_role_selection -> /select-role
                          !phone_verified        -> /verify-phone
                          role r5 (member)       -> /member
                          otherwise              -> /dashboard
        401 / 403      -> /login  (bundled login page; posts to the remote API)
        network error  -> if a previous session left an offline scope
                          (localStorage 'gymflow.scope', written by localdb.js)
                          -> /dashboard, the offline layer serves cached data.
                          Otherwise show a retry UI (first run needs the server).

    All navigation is LOCAL (same-origin bundled pages). The API origin comes
    from /capacitor-env.js, generated at build time — rebuild www to change it.
    __API_ORIGIN__ below is substituted by build-www.js for the CSP.
  -->
  <title>Gym Flow</title>
  <style>
    :root { color-scheme: dark; }
    html, body {
      margin: 0; height: 100%;
      background: #0B1120;
      color: #E2E8F0;
      font-family: -apple-system, "Segoe UI", Roboto, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .wrap {
      height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 24px;
      padding-top: max(24px, env(safe-area-inset-top));
      padding-bottom: max(24px, env(safe-area-inset-bottom));
    }
    .logo { width: 96px; height: 96px; object-fit: contain; border-radius: 20px; margin-bottom: 20px; }
    h1 { font-size: 20px; font-weight: 600; margin: 0 0 8px; }
    p { font-size: 14px; line-height: 1.5; color: #94A3B8; max-width: 320px; margin: 0; }
    .spinner {
      margin-top: 28px; width: 28px; height: 28px;
      border: 3px solid rgba(148,163,184,.25);
      border-top-color: #6366F1; border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #err { display: none; margin-top: 22px; }
    #err .retry {
      margin-top: 14px; padding: 10px 20px; border-radius: 10px;
      background: #6366F1; color: #fff; border: none; font: inherit;
      font-weight: 600; cursor: pointer;
    }
    #err .retry:active { background: #4F46E5; }
  </style>
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; connect-src 'self' __API_ORIGIN__; img-src 'self' data:; style-src 'self' 'unsafe-inline';" />
</head>
<body>
  <div class="wrap" id="wrap">
    <img class="logo" src="logo.png" alt="Gym Flow" />
    <h1>Gym Flow</h1>
    <p id="status">Starting up&hellip;</p>
    <div class="spinner" id="spin" aria-hidden="true"></div>
    <div id="err">
      <p id="errmsg">Couldn&rsquo;t reach the server. Check your connection and try again.</p>
      <button class="retry" id="retry" type="button">Retry</button>
    </div>
  </div>

  <!-- Sets window.__NATIVE_SHELL__ + window.API_BASE_URL (generated at build). -->
  <script src="/capacitor-env.js"></script>
  <!-- Shared fetch wrapper; its constructor rebases baseUrl onto API_BASE_URL. -->
  <script src="/assets/js/api.js"></script>

  <!-- External on purpose: the CSP above has no 'unsafe-inline', so an inline
       boot script is refused by Chromium (WebView + desktop) and the splash
       hangs at "Starting up…". 'self' allows this file. -->
  <script src="/launcher.js"></script>
</body>
</html>
