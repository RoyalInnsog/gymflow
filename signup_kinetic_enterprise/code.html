<!DOCTYPE html><html class="dark" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<link href="/assets/css/shared.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="/assets/js/designSystem.js"></script>
<script src="/assets/js/api.js"></script>
<script src="/assets/js/utils.js"></script>
<title>Kinetic SaaS - Sign Up</title>

<style>
    .material-symbols-outlined {
        font-family: 'Material Symbols Outlined';
        font-weight: normal;
        font-style: normal;
        font-size: 24px;
        line-height: 1;
        letter-spacing: normal;
        text-transform: none;
        display: inline-block;
        white-space: nowrap;
        word-wrap: normal;
        direction: ltr;
        -webkit-font-feature-settings: 'liga';
        -webkit-font-smoothing: antialiased;
    }
    .bg-mesh {
        background-color: #131313;
        background-image: 
            radial-gradient(at 0% 0%, rgba(53, 53, 53, 0.4) 0px, transparent 50%),
            radial-gradient(at 100% 100%, rgba(31, 31, 31, 0.5) 0px, transparent 50%);
    }
</style>

</head>
<body class="bg-mesh min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop text-on-surface font-body-md antialiased selection:bg-primary/30 selection:text-primary md:pl-[280px]">

<!-- Atmospheric background light elements -->
<div class="absolute top-1/4 left-1/4 w-96 h-96 bg-surface-variant/20 rounded-full blur-[120px] pointer-events-none"></div>
<div class="absolute bottom-1/4 right-1/4 w-[500px] h-[500px] bg-primary/5 rounded-full blur-[150px] pointer-events-none"></div>

<main class="w-full max-w-[480px] relative z-10 flex flex-col">
<!-- Glassmorphic Card -->
<div class="bg-surface-container/60 backdrop-blur-xl border border-outline-variant/30 rounded-xl p-8 md:p-10 shadow-2xl flex flex-col relative overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-br from-surface-bright/10 to-transparent pointer-events-none"></div>
<div class="relative z-10">

<div class="flex justify-center mb-xl">
<div class="h-16 w-16 flex items-center justify-center rounded-lg bg-surface-container-highest border border-outline-variant/50 shadow-inner">
<span class="material-symbols-outlined text-4xl text-primary dynamic-logo" style="font-variation-settings: 'FILL' 1;">person_add</span>
</div>
</div>

<div class="text-center mb-xl">
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-xs"><span class="dynamic-gym-name uppercase">JSB FITNESS</span></h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">Create your account</p>
</div>

<form action="#" class="flex flex-col gap-md" method="POST">
    
<div class="flex flex-col gap-base">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest pl-1" for="full_name">Full Name</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-on-surface-variant/70 text-[20px] pointer-events-none">badge</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant/40 rounded-lg py-3 pl-12 pr-4 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/30 focus:border-primary focus:ring-1 focus:ring-primary/50 transition-all outline-none shadow-inner" id="full_name" name="full_name" placeholder="John Doe" required="" type="text">
</div>
</div>

<div class="flex flex-col gap-base">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest pl-1" for="email">Email Address</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-on-surface-variant/70 text-[20px] pointer-events-none">mail</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant/40 rounded-lg py-3 pl-12 pr-4 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/30 focus:border-primary focus:ring-1 focus:ring-primary/50 transition-all outline-none shadow-inner" id="email" name="email" placeholder="you@example.com" required="" type="email">
</div>
</div>

<div class="flex flex-col gap-base">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest pl-1" for="password">Password</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-on-surface-variant/70 text-[20px] pointer-events-none">lock</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant/40 rounded-lg py-3 pl-12 pr-12 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/30 focus:border-primary focus:ring-1 focus:ring-primary/50 transition-all outline-none shadow-inner" id="password" name="password" placeholder="••••••••" required="" minlength="8" type="password">
<button class="absolute right-4 text-on-surface-variant/70 hover:text-on-surface transition-colors focus:outline-none flex items-center justify-center" onclick="const p=document.getElementById('password'); p.type=p.type==='password'?'text':'password';" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>

<div class="flex flex-col gap-base">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest pl-1" for="confirm_password">Confirm Password</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-on-surface-variant/70 text-[20px] pointer-events-none">lock_reset</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant/40 rounded-lg py-3 pl-12 pr-12 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/30 focus:border-primary focus:ring-1 focus:ring-primary/50 transition-all outline-none shadow-inner" id="confirm_password" name="confirm_password" placeholder="••••••••" required="" minlength="8" type="password">
</div>
</div>

<div class="flex items-center mt-xs mb-sm">
<label class="flex items-center gap-2 cursor-pointer group">
<div class="relative flex items-center justify-center w-4 h-4">
<input id="terms" required class="peer appearance-none w-4 h-4 border border-outline-variant rounded bg-surface-container-lowest checked:bg-primary checked:border-primary transition-all focus:outline-none focus:ring-2 focus:ring-primary/30 cursor-pointer" type="checkbox">
<span class="material-symbols-outlined absolute text-on-primary text-[14px] opacity-0 peer-checked:opacity-100 pointer-events-none">check</span>
</div>
<span class="font-body-sm text-body-sm text-on-surface-variant group-hover:text-on-surface transition-colors">I accept the terms and privacy policy</span>
</label>
</div>

<button class="w-full bg-primary text-on-primary py-4 rounded-lg font-label-caps text-label-caps tracking-widest hover:bg-primary-fixed-dim hover:scale-[0.98] active:scale-95 transition-all duration-200 flex items-center justify-center gap-2 shadow-lg shadow-primary/10 border border-primary-fixed/20 mt-2" type="submit">
<span>CREATE ACCOUNT</span>
<span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>

<div class="flex items-center gap-4 my-xl">
<div class="h-px bg-outline-variant/30 flex-1"></div>
<span class="font-label-caps text-label-caps text-on-surface-variant/60 tracking-widest">ALREADY HAVE AN ACCOUNT?</span>
<div class="h-px bg-outline-variant/30 flex-1"></div>
</div>

<button class="w-full bg-surface-container-low border border-outline-variant/40 text-on-surface py-3.5 rounded-lg font-label-caps text-label-caps tracking-widest hover:bg-surface-container hover:border-outline-variant transition-all flex items-center justify-center gap-3" onclick="window.location.href='/login'" type="button">
<span class="material-symbols-outlined text-[20px] text-primary">login</span>
<span>SIGN IN</span>
</button>
</div>
</div>
</main>

<script>
document.querySelector('form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const full_name = document.getElementById('full_name').value;
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const confirm_password = document.getElementById('confirm_password').value;
  
  if (password !== confirm_password) {
      alert("Passwords do not match.");
      return;
  }
  
  try {
    const response = await window.api.fetch('/auth/signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ full_name, email, password })
    });
    
    const data = await response.json();
    if (response.ok) {
      alert("Account created! Please check your email to verify your account.");
      window.location.href = '/login';
    } else {
      alert(data.error || 'Signup failed.');
    }
  } catch (err) {
    console.error(err);
    alert('System authentication offline.');
  }
});
</script>
</body></html>
